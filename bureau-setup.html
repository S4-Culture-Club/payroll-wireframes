// ── Date helpers ──────────────────────────────────────────────────────────────
function fmt(d) { return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
function toISO(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fromISO(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }

const UK_BH = new Set([
  '2024-01-01','2024-03-29','2024-04-01','2024-05-06','2024-05-27','2024-08-26','2024-12-25','2024-12-26',
  '2025-01-01','2025-04-18','2025-04-21','2025-05-05','2025-05-26','2025-08-25','2025-12-25','2025-12-26',
  '2026-01-01','2026-04-03','2026-04-06','2026-05-04','2026-05-25','2026-08-31','2026-12-25','2026-12-28',
]);
function isWorkingDay(d) { const w=d.getDay(); return w!==0&&w!==6&&!UK_BH.has(toISO(d)); }
function subtractWD(d,n) {
  let r=new Date(d),c=0;
  while(c<n){r.setDate(r.getDate()-1);if(isWorkingDay(r))c++;}
  while(!isWorkingDay(r))r.setDate(r.getDate()-1);
  return r;
}
function calcDeadlines(payDate,method) {
  const cut=method==='BACS'?3:method==='Bank Transfer'?2:1;
  const co=subtractWD(payDate,cut);
  return { cutOffDate:fmt(co), queryDeadline:fmt(subtractWD(co,1)), bacsApproval:fmt(new Date(co)) };
}
function taxYearEnd(d) {
  // UK tax year ends 5 April. If date is on or before 5 Apr of same year → end is that Apr 5.
  // If after 5 Apr → end is 5 Apr of next year (e.g. 30 Apr 2026 → 5 Apr 2027).
  const y=d.getFullYear();
  const apr5ThisYear=new Date(y,3,5);
  return d<=apr5ThisYear ? apr5ThisYear : new Date(y+1,3,5);
}
function addMonths(d, n) {
  // Advance by n months, clamping to last day of month.
  // Use direct Date constructor (not sequential setters) to avoid JS month-overflow
  // e.g. Apr-30 + 10 months: setMonth(Feb) while date=30 overflows to Mar-2 before setDate clamps.
  const targetMonth = d.getMonth() + n;
  const targetYear  = d.getFullYear() + Math.floor(targetMonth / 12);
  const normMonth   = ((targetMonth % 12) + 12) % 12;
  const lastDay     = new Date(targetYear, normMonth + 1, 0).getDate();
  return new Date(targetYear, normMonth, Math.min(d.getDate(), lastDay));
}
function prevWorkingDay(d) {
  // If d is a working day, return it as-is. Otherwise step backward until one is found.
  let r = new Date(d);
  while (!isWorkingDay(r)) r.setDate(r.getDate() - 1);
  return r;
}
function generateSchedule(freq,firstPayDate,method) {
  if(!firstPayDate) return [];
  const parts=firstPayDate.split('/').map(Number);
  const [dd,mm,yy]=[parts[0],parts[1],parts[2]];
  if(!dd||!mm||!yy||yy<2000) return [];
  // Adjust the anchor (first pay date) to a working day too
  const base=prevWorkingDay(new Date(yy,mm-1,dd));
  const yearEnd=taxYearEnd(base), pm=method||'BACS';
  const freqDays={'Weekly':7,'Fortnightly':14,'Four-Weekly':28};
  // Keep a separate 'nominal' base for month arithmetic so day-of-month doesn't drift
  const nominalBase=new Date(yy,mm-1,dd);
  const rows=[]; let period=0;
  // nominalPayDate drives month arithmetic; actualPayDate is what employees receive
  let nominalPayDate = new Date(nominalBase);
  while(nominalPayDate<=yearEnd){
    period++;
    const actualPayDate = prevWorkingDay(new Date(nominalPayDate));
    const wasAdjusted   = fmt(actualPayDate) !== fmt(nominalPayDate);
    let pStart,pEnd;
    if(freq==='Monthly'||freq==='Quarterly'){
      pEnd=new Date(actualPayDate); pStart=new Date(actualPayDate.getFullYear(),actualPayDate.getMonth(),1);
    } else {
      pEnd=new Date(actualPayDate); pStart=new Date(actualPayDate);
      pStart.setDate(pStart.getDate()-((freqDays[freq]||7)-1));
    }
    const dl=calcDeadlines(actualPayDate,pm);
    rows.push({period,startDate:fmt(pStart),endDate:fmt(pEnd),payDate:fmt(actualPayDate),adjusted:wasAdjusted,nominalDate:fmt(nominalPayDate),...dl});
    // Advance using NOMINAL date to preserve day-of-month (avoid drift e.g. 30th every month)
    if(freq==='Monthly')         nominalPayDate=addMonths(nominalBase,period);
    else if(freq==='Quarterly')  nominalPayDate=addMonths(nominalBase,period*3);
    else { nominalPayDate=new Date(nominalPayDate); nominalPayDate.setDate(nominalPayDate.getDate()+(freqDays[freq]||7)); }
  }
  return rows;
}

// ── Primitives ────────────────────────────────────────────────────────────────
const Avatar = ({initials,color,size=36}) => (
  <div style={{width:size,height:size,borderRadius:'50%',background:color,color:'#fff',
    fontSize:size*0.35,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
    {initials}
  </div>
);

const Btn = ({children,onClick,disabled,outline,sm,danger,ghost,full}) => {
  const bg=disabled?'#e2e8f0':danger?S4.red:(outline||ghost)?'transparent':S4.navy;
  const color=disabled?'#94a3b8':danger?'#fff':outline?S4.navy:ghost?S4.subtext:'#fff';
  const bdr=disabled?'#e2e8f0':danger?S4.red:ghost?S4.border:S4.navy;
  return <button onClick={disabled?undefined:onClick} disabled={disabled}
    style={{background:bg,color,border:`1.5px solid ${bdr}`,borderRadius:8,
      padding:sm?'5px 13px':'8px 18px',fontSize:sm?12:13,fontWeight:600,
      cursor:disabled?'not-allowed':'pointer',display:'inline-flex',alignItems:'center',
      gap:6,whiteSpace:'nowrap',width:full?'100%':undefined,justifyContent:full?'center':undefined}}>
    {children}
  </button>;
};

const Lbl = ({children,required}) => (
  <div style={{fontSize:11,fontWeight:700,color:S4.subtext,marginBottom:4,textTransform:'uppercase',letterSpacing:0.4}}>
    {children}{required&&<span style={{color:S4.red,marginLeft:2}}>*</span>}
  </div>
);

);

const YesNo = ({label,desc,value,onChange}) => (

// ── Journey Bar ───────────────────────────────────────────────────────────────
function JourneyBar({step}) {
  const steps = [
    {id:1,label:'Pending Setup'},{id:2,label:'PAYE Scheme'},{id:3,label:'YTD Upload'},
    {id:4,label:'Pay Frequency'},{id:5,label:'Schedule Preview'},{id:6,label:'Dashboard'},
  ];
  return (
    <div style={{background:S4.navy,padding:'10px 28px',position:'sticky',top:0,zIndex:100}}>
      <div style={{maxWidth:1100,margin:'0 auto',display:'flex',alignItems:'center',gap:0}}>
        <span style={{color:'#94c5cf',fontSize:12,fontWeight:700,marginRight:20,whiteSpace:'nowrap'}}>Bureau Setup</span>
        <div style={{display:'flex',alignItems:'center',flex:1,gap:0,flexWrap:'wrap'}}>
          {steps.map((s,i)=>{
            const done=s.id<step, active=s.id===step;
            return (
              <React.Fragment key={s.id}>
                <div style={{display:'flex',alignItems:'center',gap:5,padding:'4px 11px',borderRadius:999,fontSize:11,fontWeight:700,
                  background:done?S4.greenLight:active?S4.teal:'transparent',
                  color:done?S4.green:active?'#fff':'#94a3b8',
                  border:active?'none':done?'none':'1px solid rgba(255,255,255,0.15)'}}>
                  {done&&<span>✓</span>}
                  {!done&&<span style={{width:15,height:15,borderRadius:'50%',background:active?'rgba(255,255,255,0.25)':'rgba(255,255,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:900}}>{s.id}</span>}
                  {s.label}
                </div>
                {i<steps.length-1&&<div style={{width:18,height:1,background:done?S4.green:'rgba(255,255,255,0.2)',flexShrink:0}}/>}
              </React.Fragment>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Modal: Create PAYE Scheme ─────────────────────────────────────────────────
function CreatePAYEModal({org,onClose,onSave}) {
  const [form,setForm] = useState({
    payeRef:'120/A0045678',payeRefName:'Main PAYE Scheme',accountsOfficeRef:'120PA00045678',utr:'1234567890',
    allSites:'yes',sites:[...ALL_SITES],
    employmentAllowance:'Yes',apprenticeshipLevy:'No',smallEmployerRelief:'No',
    schemeEndDate:'',
  });
  const [errors,setErrors] = useState({});
  const up = (k,v) => setForm(f=>({...f,[k]:v}));
  const toggleSite = s => up('sites',form.sites.includes(s)?form.sites.filter(x=>x!==s):[...form.sites,s]);
  const handleAllSites = val => { up('allSites',val); val==='yes'?up('sites',[...ALL_SITES]):up('sites',[]); };

  const validate = () => {
    const e={};
    const paye=form.payeRef.trim().toUpperCase();
    const aor=form.accountsOfficeRef.trim().toUpperCase();
    const utr=form.utr.replace(/\s/g,'');
    if(!paye) e.payeRef='Enter your employer PAYE reference';
    else if(!/^\d{3}\/[A-Z0-9]{1,10}$/.test(paye)) e.payeRef='Enter a valid employer PAYE reference, like 123/AB456';
    if(!aor) e.accountsOfficeRef='Enter your accounts office reference number';
    else if(!/^\d{3}P[A-Z]\d{8}$/.test(aor)) e.accountsOfficeRef='Enter a valid accounts office reference, like 123PA00045678';
    if(utr&&!/^\d{10}$/.test(utr)) e.utr='Enter a valid 10-digit Unique Taxpayer Reference';
    if(form.allSites===null) e.allSites='Select whether this scheme covers all sites';
    else if(form.allSites==='no'&&form.sites.length===0) e.sites='Select at least one site';
    setErrors(e);
    return Object.keys(e).length===0;
  };

  return ModalShell({
    badge:'SPR-182', badgeColor:S4.teal,
    title:'Create PAYE Scheme',
    subtitle:'Set up the HMRC PAYE scheme for this organisation',
    onClose, maxWidth:680,
    footer:(
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:11,color:S4.subtext}}>Saved and visible on Organisation Settings → PAYE tab</span>
        <div style={{display:'flex',gap:10}}>
          <Btn outline onClick={onClose}>Cancel</Btn>
          <Btn onClick={()=>{if(validate())onSave(form);}}>Save &amp; Continue →</Btn>
        </div>
      </div>
    ),
    children:(
      <div style={{display:'flex',flexDirection:'column',gap:18}}>
        <Banner type="info">Ensure all HMRC reference numbers match your HMRC Online account exactly — these are used for all RTI submissions.</Banner>
        <div>
          <Lbl>Organisation</Lbl>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:S4.cardBg,border:`1px solid ${S4.border}`,borderRadius:8}}>
            <Avatar initials={org.initials} color={org.color} size={24}/>
            <span style={{fontSize:13,fontWeight:600,color:S4.text}}>{org.name}</span>
            <span style={{fontSize:11,color:S4.subtext,marginLeft:4}}>· {org.type}</span>
          </div>
        </div>
        <SecHead>HMRC Reference Numbers</SecHead>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div>
            <Lbl required>Employer PAYE Reference</Lbl>
            <Inp value={form.payeRef} onChange={e=>up('payeRef',e.target.value.toUpperCase())} placeholder="120/A0045678" mono/>
            {errors.payeRef
              ?<div style={{fontSize:11,color:S4.red,marginTop:3}}>{errors.payeRef}</div>
              :<div style={{fontSize:11,color:S4.subtext,marginTop:3}}>3 numbers, a slash, then up to 10 characters — e.g. <strong>123/AB456</strong></div>}
          </div>
          <div>
            <Lbl>PAYE Reference Name</Lbl>
            <Inp value={form.payeRefName} onChange={e=>up('payeRefName',e.target.value)} placeholder="e.g. Main PAYE scheme"/>
            <div style={{fontSize:11,color:S4.subtext,marginTop:3}}>Internal label to identify this scheme</div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div>
            <Lbl required>Accounts Office Reference</Lbl>
            <Inp value={form.accountsOfficeRef} onChange={e=>up('accountsOfficeRef',e.target.value.toUpperCase())} placeholder="120PA00045678" mono/>
            {errors.accountsOfficeRef
              ?<div style={{fontSize:11,color:S4.red,marginTop:3}}>{errors.accountsOfficeRef}</div>
              :<div style={{fontSize:11,color:S4.subtext,marginTop:3}}>13 characters — 3 numbers, P, a letter, 8 numbers. e.g. <strong>123PA00045678</strong></div>}
          </div>
          <div>
            <Lbl>Unique Taxpayer Reference (UTR)</Lbl>
            <Inp value={form.utr} onChange={e=>up('utr',e.target.value)} placeholder="12345 67890" mono/>
            {errors.utr

// ── View/Edit Schedule Modal (SPR-1135) ───────────────────────────────────────
// Shown from the dashboard "View schedule" button on an existing frequency card.
// Past periods are read-only; future periods allow pay date edits.
// Deadlines are recalculated on each edit. Changes save back to the freq card.
function ViewScheduleModal({freq, onClose, onSave}) {
  const TODAY = new Date();
  TODAY.setHours(0,0,0,0);
  const pm = freq.method || 'BACS';

  const parseDateStr = s => { const [d,m,y]=s.split('/').map(Number); return new Date(y,m-1,d); };
  const isPast = dateStr => parseDateStr(dateStr) < TODAY;
  const isToday = dateStr => { const d=parseDateStr(dateStr); return d.getTime()===TODAY.getTime(); };

  const [schedule, setSchedule] = useState(
    (freq.schedule && freq.schedule.length > 0) ? freq.schedule : []
  );
  const [editingIdx, setEditingIdx]   = useState(null);
  const [calVal, setCalVal]           = useState('');
  const [changedRows, setChangedRows] = useState(new Set());
  const [saved, setSaved]             = useState(false);

  const applyEdit = idx => {
    if (!calVal) { setEditingIdx(null); return; }
    const newPD = fromISO(calVal);
    const dl = calcDeadlines(newPD, pm);
    setSchedule(s => s.map((r, i) => i === idx
      ? { ...r, payDate: fmt(newPD), ...dl }
      : r
    ));
    setChangedRows(prev => new Set([...prev, idx]));
    setEditingIdx(null);
  };

  const handleSave = () => {
    // First upcoming (future) period → update the card headline dates
    const firstFuture = schedule.find(r => !isPast(r.payDate));
    onSave(schedule, firstFuture);
    setSaved(true);
    setChangedRows(new Set());
    setTimeout(()=>setSaved(false), 2500);
  };

  const hasChanges = changedRows.size > 0;
  const futureCount = schedule.filter(r => !isPast(r.payDate)).length;

  return ModalShell({
    badge:'SPR-1135', badgeColor:S4.navy,
    title:`Pay Schedule — ${freq.name}`,
    subtitle:`${freq.freq} · ${pm} · ${schedule.length} periods total · ${futureCount} upcoming`,
    onClose, maxWidth:920,
    footer:(
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,fontSize:12,color:S4.subtext}}>
          <span style={{background:S4.greenLight,color:S4.green,borderRadius:999,padding:'2px 10px',fontSize:11,fontWeight:700}}>Bureau Admin</span>
          <span>Future pay dates are editable. Past periods are locked.</span>
          {saved && <span style={{color:S4.green,fontWeight:700}}>✓ Saved — card updated</span>}
        </div>
        <div style={{display:'flex',gap:10}}>
          <Btn outline onClick={onClose}>Close</Btn>
          {hasChanges && <Btn onClick={handleSave}>Save Schedule Changes →</Btn>}
        </div>
      </div>
    ),
    children:(
      <div style={{display:'flex',flexDirection:'column',gap:12}}>

        {/* Summary chips */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
          {[
            ['Frequency', freq.freq||'—'],
            ['Payment Method', pm],
            ['Periods locked', schedule.filter(r=>isPast(r.payDate)).length],
            ['Periods upcoming', futureCount],
          ].map(([lbl,val])=>(

                            : today   ? S4.amberLight

              return (
                <div key={idx} style={{display:'grid',gridTemplateColumns:'40px 90px 90px 105px 110px 115px 1fr 46px',padding:'8px 14px',gap:8,alignItems:'center',

                  <div style={{fontSize:11,fontWeight:700,color:past?'#cbd5e1':S4.subtext}}>

                  <div style={{fontSize:11,color:past?'#cbd5e1':S4.red,fontWeight:600}}>{row.cutOffDate}</div>

                  <div style={{fontSize:11,color:past?'#cbd5e1':S4.teal,fontWeight:600}}>{row.bacsApproval}</div>

                  {/* Pay date cell */}
                  <div>
                    {editingIdx===idx ? (
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <input type="date" value={calVal} onChange={e=>setCalVal(e.target.value)}
                          style={{border:`1.5px solid ${S4.teal}`,borderRadius:6,padding:'3px 6px',fontSize:11,outline:'none',background:'#fff'}} />
                        <button onClick={()=>applyEdit(idx)}
                          style={{background:S4.teal,color:'#fff',border:'none',borderRadius:4,padding:'4px 10px',cursor:'pointer',fontSize:11,fontWeight:700}}>✓</button>
                        <button onClick={()=>setEditingIdx(null)}
                          style={{background:'none',border:`1px solid ${S4.border}`,borderRadius:4,padding:'4px 8px',cursor:'pointer',fontSize:11,color:S4.subtext}}>✕</button>
                      </div>
                    ) : (
                      <span style={{fontSize:12,fontWeight:700,color:past?'#94a3b8':S4.text}}>
                        {row.payDate}
                        {changed && <span style={{marginLeft:6,fontSize:9,background:S4.greenLight,color:S4.green,borderRadius:999,padding:'1px 6px',fontWeight:700}}>EDITED</span>}
                      </span>
                    )}
                  </div>

                  {/* Action cell */}
                  <div style={{display:'flex',justifyContent:'center'}}>
                    {past ? (
                      <span title="Past period — locked" style={{fontSize:14,color:'#cbd5e1',cursor:'default'}}>🔒</span>
                    ) : editingIdx!==idx ? (
                      <button onClick={()=>{setEditingIdx(idx);const[d,m,y]=row.payDate.split('/');setCalVal(`${y}-${m}-${d}`);}}
                        title="Edit pay date"
                        style={{background:'none',border:`1px solid ${S4.border}`,borderRadius:6,padding:'4px 8px',cursor:'pointer',fontSize:11,color:S4.text,display:'flex',alignItems:'center',gap:3}}>
                        ✏
                      </button>
                    ) : null}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    ),
  });
}

  return ModalShell({

          </div>
        ))}
      </div>
    ),
  });
}

// ── YTD Upload modal (SPR-1187/88/89) ────────────────────────────────────────
function YTDModal({org,payeSchemes,onClose,onDone}) {
  const [step,       setStep]       = useState('select');
  const [uploadType, setUploadType] = useState(null);
  const [assocPAYE,  setAssocPAYE]  = useState('');
  const [progress,   setProgress]   = useState(0);
  const [fixes,      setFixes]      = useState({});
  const [applied,    setApplied]    = useState({});
  const [editingIdx, setEditingIdx] = useState(null);

  const FPS_ERRORS = [
    {row:12,employee:'Sarah Williams',field:'NI Number',  value:'AB123456Z',  message:'Invalid NI format — must be 2 letters, 6 digits, 1 letter (A–D)'},
    {row:23,employee:'Kevin Hart',    field:'Tax Code',   value:'1500',       message:'Tax code incomplete — suffix letter required e.g. 1500L'},
    {row:31,employee:'Emma Davis',    field:'Gross YTD',  value:'-500',       message:'Negative YTD gross is not valid for this field'},
  ];
  const XLSX_ERRORS = Array.from({length:12},(_,i)=>({
    row:i+2, employee:`Employee ${i+1}`,
    field:i%3===0?'NI Number':i%3===1?'Tax Code':'Gross YTD',
    value:'INVALID', message:'Value could not be parsed — check formatting in the template',
  }));

  const errors      = uploadType==='fps' ? FPS_ERRORS : XLSX_ERRORS;
  const tooManyErrs = errors.length > 10;
  const allFixed    = !tooManyErrs && errors.every((_,i)=>applied[i]);
  const canUpload   = uploadType && assocPAYE;

  const startUpload = () => {
    setStep('uploading'); setProgress(0);
    const iv = setInterval(()=>setProgress(p=>{ if(p>=100){clearInterval(iv);setStep(errors.length===0?'success':'errors');return 100;} return p+8; }), 120);
  };

  const footerEl =
    step==='select'   ? <div style={{display:'flex',justifyContent:'flex-end',gap:10}}><Btn outline onClick={onClose}>Cancel</Btn><Btn disabled={!canUpload} onClick={startUpload}>Upload →</Btn></div>
  : step==='errors' && tooManyErrs ? (
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
        <span style={{fontSize:11,color:S4.red,fontWeight:600}}>Too many errors — file must be corrected and re-uploaded</span>
        <div style={{display:'flex',gap:10}}><Btn outline onClick={onClose}>Cancel</Btn><Btn onClick={()=>{setStep('select');setProgress(0);}}>Re-upload corrected file →</Btn></div>
      </div>
    )
  : step==='errors' ? (
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
        <span style={{fontSize:11,color:S4.subtext}}>{Object.keys(applied).length}/{errors.length} errors resolved · valid rows stored</span>
        <div style={{display:'flex',gap:10}}><Btn ghost sm onClick={onDone}>Close — keep valid rows</Btn><Btn sm disabled={!allFixed} onClick={()=>setStep('success')}>Save all fixed rows →</Btn></div>
      </div>
    )
  : step==='success' ? <div style={{display:'flex',justifyContent:'flex-end'}}><Btn onClick={onDone}>Done ✓</Btn></div>
  : null;

  return ModalShell({
    badge:'SPR-1187/88/89', badgeColor:S4.navy,
    title:'Upload Year-to-Date Data',
    subtitle:`Importing existing payroll data for ${org.name}`,
    onClose, maxWidth:700, footer:footerEl,
    children:(
      <div>
        {/* ── SELECT ── */}
        {step==='select' && (
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <Banner type="info">YTD data can only be uploaded once a PAYE scheme has been created. Associate the upload with a PAYE scheme below.</Banner>
            <div>
              <Lbl required>Associate with PAYE Scheme</Lbl>
              <Sel value={assocPAYE} onChange={e=>setAssocPAYE(e.target.value)}>
                <option value="">Select PAYE scheme…</option>
                {payeSchemes.map(p=><option key={p.id} value={p.id}>{p.payeRef} — {p.payeRefName||'PAYE scheme'}</option>)}
              </Sel>
              <div style={{fontSize:11,color:S4.subtext,marginTop:3}}>Uploaded YTD data will be linked to this PAYE scheme and stored in employee YTD tables</div>
            </div>
            <SecHead>Select Upload Method</SecHead>
            {[
              {id:'fps', icon:'📄',label:'FPS XML Import',   badge:'Recommended',badgeC:S4.green,
               desc:'Upload a Full Payment Submission XML file exported from your previous payroll software. Automatically maps all employee YTD figures. Accepted format: .xml'},
              {id:'xlsx',icon:'📊',label:'Spreadsheet (.xlsx)',badge:'SPR-1188', badgeC:S4.purple,
               desc:"Download our XLSX template, populate it with employee YTD data, then upload. Suitable if you don't have FPS XML access. Accepted format: .xlsx"},
            ].map(opt=>(
              <button key={opt.id} onClick={()=>setUploadType(opt.id)}
                style={{display:'flex',alignItems:'flex-start',gap:14,padding:16,textAlign:'left',cursor:'pointer',
                  background:uploadType===opt.id?S4.tealLight:'#fff',
                  border:`2px solid ${uploadType===opt.id?S4.teal:S4.border}`,borderRadius:10}}>
                <div style={{width:40,height:40,background:uploadType===opt.id?S4.teal:S4.cardBg,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{opt.icon}</div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                    <span style={{fontWeight:700,color:S4.text,fontSize:14}}>{opt.label}</span>
                    <span style={{background:opt.badgeC,color:'#fff',borderRadius:4,padding:'1px 7px',fontSize:10,fontWeight:700}}>{opt.badge}</span>
                  </div>
                  <div style={{fontSize:12,color:S4.subtext,marginTop:4}}>{opt.desc}</div>
                  {opt.id==='xlsx'&&<button onClick={e=>e.stopPropagation()} style={{marginTop:6,fontSize:11,color:S4.teal,background:'none',border:'none',cursor:'pointer',padding:0,textDecoration:'underline'}}>⬇ Download blank template</button>}
                </div>
                {uploadType===opt.id&&<span style={{color:S4.teal,fontSize:18,flexShrink:0}}>✓</span>}
              </button>
            ))}
            {uploadType&&(
              <div>
                <div style={{background:S4.cardBg,border:`2px dashed ${S4.tealBorder}`,borderRadius:10,padding:20,textAlign:'center',cursor:'pointer'}}>
                  <div style={{fontSize:28,marginBottom:8}}>{uploadType==='fps'?'📄':'📊'}</div>
                  <div style={{fontWeight:600,color:S4.text,fontSize:13}}>Click to choose file or drag and drop here</div>
                  <div style={{fontSize:11,color:S4.subtext,marginTop:3}}>Accepts {uploadType==='fps'?'.xml (FPS format)':'.xlsx files'} only</div>
                  <div style={{marginTop:10,background:'#fff',border:`1px solid ${S4.border}`,borderRadius:6,padding:'6px 16px',display:'inline-block',fontSize:12,color:S4.subtext}}>
                    {uploadType==='fps'?'FPS_2024_25_Q3.xml':'YTD_Template_Filled.xlsx'} — ready
                  </div>
                </div>
                <div style={{marginTop:10}}>
                  <Banner type={uploadType==='fps'?'info':'amber'}>
                    {uploadType==='fps'
                      ?'FPS upload: if fewer than 10 errors are found, valid rows are stored immediately. 10 or more errors require a corrected re-upload.'
                      :'XLSX upload: if fewer than 10 errors are found, valid rows are stored immediately. 10 or more errors require a corrected re-upload.'}
                  </Banner>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── UPLOADING ── */}
        {step==='uploading'&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:20,padding:'30px 0'}}>
            <div style={{fontSize:40,animation:'spin 1s linear infinite'}}>⟳</div>
            <div style={{fontWeight:700,color:S4.text,fontSize:15}}>Processing {uploadType==='fps'?'FPS XML':'spreadsheet'}…</div>
            <div style={{width:'100%',background:'#e2e8f0',borderRadius:999,height:8,overflow:'hidden'}}>
              <div style={{width:`${progress}%`,height:'100%',background:S4.teal,borderRadius:999,transition:'width 0.1s'}}/>
            </div>
            <div style={{fontSize:13,color:S4.subtext}}>
              {progress<30?'Parsing file…':progress<60?'Matching employee records…':progress<85?'Validating YTD figures…':'Finalising…'}
            </div>
          </div>
        )}

        {/* ── ERRORS ── */}
        {step==='errors'&&(
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {tooManyErrs
              ?<Banner type="error">{errors.length} validation errors found — this exceeds the limit of 10. Please correct your {uploadType==='fps'?'FPS XML':'spreadsheet'} file and re-upload. No data has been stored.</Banner>
              :<Banner type="amber">{errors.length} validation errors found (under 10). Valid rows have been stored. Fix the errors below to save the remaining records, or close to keep only the valid rows.</Banner>}
            <div style={{border:`1px solid ${S4.border}`,borderRadius:10,overflow:'hidden'}}>
              <div style={{padding:'8px 14px',background:S4.cardBg,borderBottom:`1px solid ${S4.border}`,display:'flex',gap:10,alignItems:'center'}}>
                <span style={{fontWeight:700,fontSize:13,color:S4.text}}>Validation Errors</span>
                <Pill color={tooManyErrs?'red':'amber'}>{tooManyErrs?`${errors.length} errors — re-upload required`:`${errors.filter((_,i)=>!applied[i]).length} remaining`}</Pill>
              </div>
              {errors.map((err,idx)=>(
                <div key={idx} style={{borderBottom:idx<errors.length-1?`1px solid ${S4.border}`:'none'}}>
                  <div style={{padding:12,display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10,flexWrap:'wrap',
                    background:applied[idx]?'#f0fdf4':idx%2===0?'#fff':'#fafcfd'}}>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:4}}>
                        <span style={{fontSize:11,background:S4.redLight,color:S4.red,borderRadius:4,padding:'1px 6px',fontWeight:700}}>Row {err.row}</span>
                        <span style={{fontWeight:700,fontSize:13,color:S4.text}}>{err.employee}</span>
                        <span style={{fontSize:11,color:S4.subtext}}>· {err.field}</span>
                      </div>
                      <div style={{fontSize:12,color:S4.red}}>{err.message}</div>
                      {applied[idx]&&<div style={{fontSize:11,color:S4.green,marginTop:2}}>→ corrected: <strong>{applied[idx]}</strong></div>}
                    </div>
                    {!tooManyErrs&&(
                      applied[idx]?<Pill color="green">✓ Fixed</Pill>
                      :editingIdx===idx?(
                        <div style={{display:'flex',gap:5,alignItems:'center'}}>
                          <input value={fixes[idx]||''} onChange={e=>setFixes(f=>({...f,[idx]:e.target.value}))} placeholder="Corrected value"
                            style={{border:`1.5px solid ${S4.teal}`,borderRadius:6,padding:'4px 8px',fontSize:12,outline:'none',width:130}}/>
                          <button onClick={()=>{setApplied(a=>({...a,[idx]:fixes[idx]}));setEditingIdx(null);}}
                            style={{background:S4.teal,color:'#fff',border:'none',borderRadius:5,padding:'4px 7px',cursor:'pointer',fontSize:11}}>✓</button>
                          <button onClick={()=>setEditingIdx(null)} style={{background:'none',border:'none',cursor:'pointer',color:'#94a3b8',fontSize:12}}>✕</button>
                        </div>
                      ):<Btn sm onClick={()=>setEditingIdx(idx)}>Fix →</Btn>
                    )}
                  </div>
                </div>
              ))}
            </div>
            {tooManyErrs&&<Banner type="info">Tip: open your {uploadType==='fps'?'FPS XML':'spreadsheet'} file, fix all highlighted rows, save, and re-upload using the button below.</Banner>}
          </div>
        )}

        {/* ── SUCCESS ── */}
        {step==='success'&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16,padding:'24px 0'}}>
            <div style={{width:60,height:60,background:S4.greenLight,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>✓</div>
            <div style={{fontWeight:700,fontSize:16,color:S4.text}}>YTD data imported successfully</div>
            <div style={{fontSize:12,color:S4.subtext}}>Data stored in employee YTD tables · visible on each employee profile</div>
            <div style={{background:S4.cardBg,borderRadius:10,padding:16,width:'100%',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
              {[['62','Employees updated'],['0','Errors remaining'],['2025/26','Tax year']].map(([val,lbl])=>(
                <div key={lbl} style={{textAlign:'center'}}>
                  <div style={{fontSize:22,fontWeight:800,color:S4.text}}>{val}</div>
                  <div style={{fontSize:11,color:S4.subtext,marginTop:2}}>{lbl}</div>
                </div>
              ))}
            </div>
            <Banner type="info">Uploaded data overrides any existing YTD data for these employees — this is now the latest source of truth.</Banner>
          </div>
        )}
      </div>
    ),
  });
}

// ── Screen 3: YTD Upload — per-PAYE, full page ───────────────────────────────
// Primary journey step after PAYE creation. Shows all PAYEs for this org, allows
// FPS/XLSX upload for each, and lets the user add further PAYEs in-flow before
// continuing to pay frequencies.
function YTDUploadScreen({org, payeSchemes, onAddPAYE, onContinue}) {
  // Track upload status per PAYE id
  const [ytdByPAYE,  setYtdByPAYE]  = useState({});  // { payeId: 'uploaded' | 'skipped' }
  const [activePAYE, setActivePAYE]  = useState(payeSchemes[0]?.id || null);
  const [uploadModal,setUploadModal] = useState(false);

  // Keep activePAYE in sync when payeSchemes grows (new PAYE added)
  const prevLen = payeSchemes.length;
  if (payeSchemes.length > prevLen && payeSchemes.at(-1)) {
    setActivePAYE(payeSchemes.at(-1).id);
  }

  const allDone  = payeSchemes.length > 0 && payeSchemes.every(p => ytdByPAYE[p.id]);
  const anyDone  = payeSchemes.some(p => ytdByPAYE[p.id] === 'uploaded');
  const activePAYEData = payeSchemes.find(p => p.id === activePAYE);

  const handleUploadDone = () => {
    setYtdByPAYE(prev => ({...prev, [activePAYE]: 'uploaded'}));
    setUploadModal(false);
    // Auto-advance to next PAYE that hasn't been uploaded yet
    const next = payeSchemes.find(p => p.id !== activePAYE && !ytdByPAYE[p.id]);
    if (next) setActivePAYE(next.id);
  };

  const handleSkip = payeId => setYtdByPAYE(prev => ({...prev, [payeId]: 'skipped'}));

  return (
    <div style={{padding:'24px 28px', maxWidth:1100, margin:'0 auto'}}>
      {/* Page header */}
      <div style={{marginBottom:20}}>
        <h1 style={{fontSize:19,fontWeight:700,color:S4.text,margin:0}}>Upload Year-to-Date Data</h1>
        <p style={{fontSize:13,color:S4.subtext,marginTop:4}}>
          Upload an FPS XML or XLSX file for each PAYE scheme. This populates employee YTD tables and becomes the source of truth for payroll runs.
        </p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:20,alignItems:'start'}}>

        {/* Left: PAYE list */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{fontWeight:700,fontSize:12,color:S4.subtext,textTransform:'uppercase',letterSpacing:0.5,marginBottom:2}}>PAYE Schemes</div>
          {payeSchemes.map(p=>{
            const status = ytdByPAYE[p.id];
            const isActive = activePAYE === p.id;
            return (
              <button key={p.id} onClick={()=>setActivePAYE(p.id)}
                style={{display:'flex',alignItems:'flex-start',gap:10,padding:'11px 14px',borderRadius:10,cursor:'pointer',textAlign:'left',
                  background:isActive?S4.tealLight:'#fff',
                  border:`2px solid ${isActive?S4.teal:S4.border}`}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:S4.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.payeRef||'PAYE Scheme'}</div>
                  <div style={{fontSize:11,color:S4.subtext,marginTop:1}}>{p.payeRefName||org.name}</div>
                </div>
                <span style={{
                  fontSize:10,fontWeight:700,borderRadius:999,padding:'2px 8px',flexShrink:0,marginTop:1,
                  background:status==='uploaded'?S4.greenLight:status==='skipped'?S4.amberLight:'#f1f5f9',
                  color:status==='uploaded'?S4.green:status==='skipped'?'#92400e':'#94a3b8',
                }}>
                  {status==='uploaded'?'✓ Uploaded':status==='skipped'?'Skipped':'Pending'}
                </span>
              </button>
            );
          })}

          {/* Add another PAYE */}
          <button onClick={onAddPAYE}
            style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',borderRadius:10,cursor:'pointer',
              background:'none',border:`2px dashed ${S4.border}`,color:S4.teal,fontWeight:700,fontSize:12}}>
            <span style={{fontSize:16}}>＋</span> Add another PAYE scheme
          </button>
        </div>

        {/* Right: upload panel for active PAYE */}
        <div style={{background:'#fff',border:`1px solid ${S4.border}`,borderRadius:12,overflow:'hidden'}}>
          {activePAYEData ? (
            <>
              {/* PAYE header */}
              <div style={{background:S4.navy,padding:'14px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <div style={{color:'#fff',fontWeight:700,fontSize:15}}>{activePAYEData.payeRef||'PAYE Scheme'}</div>
                  <div style={{color:'#94c5cf',fontSize:11,marginTop:2}}>{activePAYEData.payeRefName||org.name} · {org.type}</div>
                </div>
                {ytdByPAYE[activePAYE]==='uploaded'
                  ?<Pill color="green">✓ YTD Uploaded</Pill>
                  :ytdByPAYE[activePAYE]==='skipped'
                    ?<Pill color="amber">Skipped</Pill>
                    :<Pill color="amber">Pending upload</Pill>}
              </div>

              <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
                {ytdByPAYE[activePAYE]==='uploaded' ? (
                  <>
                    <Banner type="success">YTD data uploaded successfully. Employee YTD tables have been populated and this is now the source of truth.</Banner>
                    <div style={{display:'flex',gap:10}}>
                      <Btn outline onClick={()=>setUploadModal(true)}>Re-upload →</Btn>
                    </div>
                  </>
                ) : ytdByPAYE[activePAYE]==='skipped' ? (
                  <>
                    <Banner type="amber">YTD upload skipped. You can return to Org Settings → YTD Data at any time to upload before running payroll for existing employees.</Banner>
                    <Btn outline onClick={()=>setYtdByPAYE(prev=>({...prev,[activePAYE]:undefined}))}>Upload now →</Btn>
                  </>
                ) : (
                  <>
                    <Banner type="info">Upload an FPS XML file from your previous payroll supplier, or use the XLSX template if FPS isn't available. Uploaded data overrides any existing YTD figures for this PAYE.</Banner>

                    {/* Method cards */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                      {[
                        {icon:'📄',label:'FPS XML',tag:'Recommended',tagC:S4.green,
                         desc:'Full Payment Submission XML exported from previous payroll software. Employee YTD figures are automatically mapped.'},
                        {icon:'📊',label:'XLSX Spreadsheet',tag:'Alternative',tagC:S4.purple,
                         desc:"No FPS access? Download the XLSX template, populate the Employee YTD tab, then upload."},
                      ].map(m=>(
                        <div key={m.label} style={{background:S4.cardBg,border:`1px solid ${S4.border}`,borderRadius:10,padding:14,display:'flex',gap:10}}>
                          <div style={{fontSize:24,flexShrink:0}}>{m.icon}</div>
                          <div>
                            <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:4,flexWrap:'wrap'}}>
                              <span style={{fontWeight:700,fontSize:13,color:S4.text}}>{m.label}</span>
                              <span style={{background:m.tagC,color:'#fff',borderRadius:4,padding:'1px 6px',fontSize:10,fontWeight:700}}>{m.tag}</span>
                            </div>
                            <div style={{fontSize:11,color:S4.subtext,lineHeight:1.5}}>{m.desc}</div>
                            {m.label==='XLSX Spreadsheet'&&<button style={{marginTop:5,fontSize:11,color:S4.teal,background:'none',border:'none',cursor:'pointer',padding:0,textDecoration:'underline'}}>⬇ Download template</button>}
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* Validation rules */}
                    <div style={{background:'#fafcfd',border:`1px solid ${S4.border}`,borderRadius:10,padding:14}}>
                      <div style={{fontWeight:700,fontSize:11,color:S4.subtext,textTransform:'uppercase',letterSpacing:0.4,marginBottom:8}}>Validation Rules</div>
                      {[
                        {icon:'✓',col:S4.green, text:'Fewer than 10 errors — valid rows stored; errors shown per Payroll ID for manual correction'},
                        {icon:'✕',col:S4.red,   text:'10 or more errors — upload rejected; affected employees listed by Payroll ID and name; re-upload required'},
                        {icon:'↻',col:S4.teal,  text:'Upload overrides existing YTD data for this PAYE — becomes the latest source of truth in the DB'},
                      ].map(r=>(
                        <div key={r.text} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:5}}>
                          <span style={{fontWeight:700,color:r.col,fontSize:13,flexShrink:0}}>{r.icon}</span>
                          <span style={{fontSize:12,color:S4.subtext}}>{r.text}</span>
                        </div>
                      ))}
                    </div>

                    <div style={{display:'flex',gap:10,alignItems:'center'}}>
                      <Btn onClick={()=>setUploadModal(true)}>⬆ Upload YTD data →</Btn>
                      <Btn ghost sm onClick={()=>handleSkip(activePAYE)}>Skip for now</Btn>
                    </div>
                  </>
                )}
              </div>
            </>
          ) : (
            <div style={{padding:40,textAlign:'center',color:S4.subtext,fontSize:13}}>Select a PAYE scheme to upload YTD data</div>
          )}
        </div>
      </div>

      {/* Footer actions */}
      <div style={{marginTop:20,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
        <div style={{fontSize:12,color:S4.subtext}}>
          {allDone
            ? <span style={{color:S4.green,fontWeight:700}}>✓ All PAYE schemes have YTD data — ready to continue</span>
            : anyDone
              ? `${payeSchemes.filter(p=>ytdByPAYE[p.id]==='uploaded').length} of ${payeSchemes.length} PAYE scheme${payeSchemes.length>1?'s':''} uploaded`
              : 'Upload FPS or XLSX for each PAYE scheme before processing payroll'}
        </div>
        <div style={{display:'flex',gap:10}}>
          {!allDone && payeSchemes.some(p=>!ytdByPAYE[p.id]) && (
            <Btn ghost sm onClick={()=>payeSchemes.filter(p=>!ytdByPAYE[p.id]).forEach(p=>handleSkip(p.id))}>
              Skip all remaining
            </Btn>
          )}
          <Btn disabled={payeSchemes.length===0} onClick={onContinue}>
            Continue to Pay Frequencies →
          </Btn>
        </div>
      </div>

      {uploadModal && activePAYEData && (
        <YTDModal org={org} payeSchemes={[activePAYEData]} onClose={()=>setUploadModal(false)} onDone={handleUploadDone}/>
      )}
    </div>
  );
}

function OrgSettingsScreen({org,payeSchemes,onBack,onAddFreq,onAddPAYE}) {

            {payeData&&ytdStatus!=='done'&&(
              <div style={{background:'#fafcfd',border:`1px solid ${S4.border}`,borderRadius:10,padding:14}}>
                <div style={{fontWeight:700,fontSize:12,color:S4.text,marginBottom:8}}>Validation Rules</div>
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {[
                    {icon:'✓',col:S4.green, text:'Fewer than 10 errors — valid rows stored immediately; errors shown for manual correction'},
                    {icon:'✕',col:S4.red,   text:'10 or more errors — entire upload rejected; notification shows affected Payroll IDs and names; re-upload required'},
                    {icon:'↻',col:S4.teal,  text:'Uploaded data overrides existing YTD data — this becomes the latest source of truth in the DB'},
                  ].map(r=>(
                    <div key={r.text} style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                      <span style={{fontWeight:700,color:r.col,fontSize:13,flexShrink:0,marginTop:1}}>{r.icon}</span>
                      <span style={{fontSize:12,color:S4.subtext}}>{r.text}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Manual YTD entry section (shows after upload if <10 missing) */}
            {payeData&&ytdStatus!=='done'&&(
              <div style={{borderTop:`1px solid ${S4.border}`,paddingTop:16}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:8}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:S4.text}}>Manual YTD Entry</div>
                    <div style={{fontSize:11,color:S4.subtext,marginTop:2}}>
                      {canManual
                        ?`${missingCount} employee${missingCount>1?'s':''} with missing fields — available for manual entry (under 10)`
                        :missingCount>=10
                          ?`${missingCount} employees missing data — manual entry is disabled; upload required to resolve all missing records`
                          :'All employees have complete YTD data'}
                    </div>
                  </div>
                  {missingCount>=10&&<Pill color="red">Re-upload required</Pill>}
                </div>

                {missingCount>=10&&(
                  <Banner type="error">
                    {missingCount} employees are missing YTD data — this exceeds the limit for manual correction. Please correct your file and re-upload.
                    The following employees are affected:
                    <ul style={{margin:'8px 0 0 16px',padding:0,fontSize:11}}>
                      {missingEmps.filter(e=>!completedIds.includes(e.id)).map(e=>(
                        <li key={e.id} style={{marginBottom:2}}><strong>{e.name}</strong> — {e.fields.filter(f=>!f.uploaded).length} field{e.fields.filter(f=>!f.uploaded).length>1?'s':''} missing</li>
                      ))}
                    </ul>
                  </Banner>
                )}

                {canManual&&(
                  <div style={{border:`1px solid ${S4.border}`,borderRadius:10,overflow:'hidden'}}>
                    <div style={{padding:'8px 14px',background:S4.cardBg,borderBottom:`1px solid ${S4.border}`,display:'flex',gap:10,alignItems:'center'}}>
                      <span style={{fontSize:13,fontWeight:700,color:S4.text}}>Employees with missing YTD data</span>
                      <Pill color="amber">{missingCount} remaining</Pill>
                    </div>
                    {missingEmps.map((emp,i)=>{
                      const done=completedIds.includes(emp.id);
                      return (
                        <div key={emp.id} style={{padding:'10px 14px',borderBottom:i<missingEmps.length-1?`1px solid ${S4.border}`:'none',
                          display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,
                          background:done?'#f0fdf4':i%2===0?'#fff':'#fafcfd'}}>
                          <div style={{display:'flex',alignItems:'center',gap:10}}>
                            <Avatar initials={emp.initials} color={emp.color} size={30}/>
                            <div>
                              <div style={{fontSize:13,fontWeight:600,color:S4.text}}>{emp.name}</div>
                              <div style={{fontSize:11,color:S4.subtext}}>
                                {done?'All fields complete':`${emp.fields.filter(f=>!f.uploaded).length} field${emp.fields.filter(f=>!f.uploaded).length>1?'s':''} missing`}
                              </div>
                            </div>
                          </div>
                          {done
                            ?<span style={{fontSize:12,color:S4.green,fontWeight:700}}>Complete ✓</span>
                            :<Btn sm onClick={()=>setEditEmp(emp)}>Enter data →</Btn>}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {activeTab!=='PAYE'&&activeTab!=='YTD Data'&&(
          <div style={{padding:40,textAlign:'center',color:'#94a3b8',fontSize:13}}>{activeTab} — not in scope for this wireframe</div>
        )}
      </div>

      <div style={{display:'flex',justifyContent:'flex-end',gap:10}}>
        <Btn outline onClick={onBack}>← Back to Dashboard</Btn>
        <Btn onClick={onAddFreq}>＋ Add Pay Frequency</Btn>
      </div>

      {showUpload&&<YTDModal org={org} payeSchemes={payeSchemes} onClose={()=>setShowUpload(false)} onDone={()=>{setYtdStatus('done');setShowUpload(false);}}/>}
      {editEmp&&<ManualYTDModal emp={editEmp} onClose={()=>setEditEmp(null)} onSave={handleManualSave}/>}
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App() {
  const [step,setStep]           = useState(1);
  const [screen,setScreen]       = useState('pending');
  const [activeOrg,setActiveOrg] = useState(null);
  const [payeSchemes,setPayeSchemes] = useState([]);
  const [freqForm,setFreqForm]   = useState(null);
  const [freqs,setFreqs]         = useState([]);
  const [showPAYE,setShowPAYE]   = useState(false);
  const [showFreq,setShowFreq]   = useState(false);
  const [viewScheduleFreq,setViewScheduleFreq] = useState(null);

  const handleSetup = org => { setActiveOrg(org); setStep(2); setShowPAYE(true); };

  const handlePAYESave = data => {
    setPayeSchemes(p=>[...p,{id:`paye-${Date.now()}`,...data}]);
    setShowPAYE(false); setStep(3); setScreen('ytd_upload');
  };

  const handleFreqSave = data => {
    setFreqForm(data); setShowFreq(false); setStep(5); setScreen('schedule');
  };

  const handleScheduleConfirm = (schedule) => {
    // First future period drives the headline dates on the card
    const today = new Date(); today.setHours(0,0,0,0);
    const firstFuture = schedule && schedule.find(r => {
      const [d,m,y] = r.payDate.split('/').map(Number);
      return new Date(y,m-1,d) >= today;
    });
    const nf = {
      id:`f-${Date.now()}`,
      name:freqForm.name||`${freqForm.frequency} – ${activeOrg.name}`,
      freq:freqForm.frequency||'Monthly',
      nextPay: firstFuture ? firstFuture.payDate : freqForm.firstPayDate||'—',
      deadline: firstFuture ? firstFuture.cutOffDate : '—',
      method:freqForm.paymentMethod||'BACS',
      types:freqForm.payTypes||[],
      schedule: schedule||[],
    };
    setFreqs(p=>[...p,nf]); setStep(6); setScreen('dashboard');
  };

  const handleViewSchedule = freq => setViewScheduleFreq(freq);

  const handleScheduleSave = (updatedSchedule, firstFuture) => {
    setFreqs(prev => prev.map(f => f.id === viewScheduleFreq.id ? {
      ...f,
      schedule: updatedSchedule,
      nextPay:  firstFuture ? firstFuture.payDate    : f.nextPay,
      deadline: firstFuture ? firstFuture.cutOffDate : f.deadline,
    } : f));
    setViewScheduleFreq(v => v ? {...v, schedule: updatedSchedule} : v);
  };

  const goToDashboard   = () => { setScreen('dashboard'); setStep(payeSchemes.length>0?6:3); };
  const goToOrgSettings = () => { setScreen('org_settings'); setStep(3); };
  const goToAddFreq     = () => { setStep(4); setShowFreq(true); };
  const goToAddPAYE     = () => { setStep(2); setShowPAYE(true); };

  const resetAll = () => {
    setStep(1); setScreen('pending'); setActiveOrg(null);
    setPayeSchemes([]); setFreqForm(null); setShowPAYE(false); setShowFreq(false);
    setFreqs([]); setViewScheduleFreq(null);
  };

  return (
    <div style={{minHeight:'100vh',background:S4.pageBg}}>
      <JourneyBar step={step} />

      {screen==='pending'      && <PendingSetup onSetup={handleSetup} />}
      {screen==='ytd_upload'   && activeOrg && <YTDUploadScreen org={activeOrg} payeSchemes={payeSchemes} onAddPAYE={goToAddPAYE} onContinue={()=>{setStep(4);setScreen('dashboard');}} />}
      {screen==='dashboard'    && activeOrg && <OrgDashboard org={activeOrg} payeSchemes={payeSchemes} frequencies={freqs} onAddFreq={goToAddFreq} onOrgSettings={goToOrgSettings} onViewSchedule={handleViewSchedule} />}
      {screen==='org_settings' && activeOrg && <OrgSettingsScreen org={activeOrg} payeSchemes={payeSchemes} onBack={goToDashboard} onAddFreq={goToAddFreq} onAddPAYE={goToAddPAYE} />}
      {screen==='schedule'     && activeOrg && freqForm && <SchedulePreview org={activeOrg} freqForm={freqForm} onBack={()=>{setStep(4);setShowFreq(true);setScreen('dashboard');}} onConfirm={handleScheduleConfirm} />}

      {showPAYE && activeOrg && <CreatePAYEModal org={activeOrg} onClose={()=>{setShowPAYE(false);if(screen==='ytd_upload')return;setScreen('pending');setStep(1);}} onSave={handlePAYESave} />}
      {showFreq && activeOrg && <CreateFreqModal org={activeOrg} onClose={()=>setShowFreq(false)} onSave={handleFreqSave} />}
      {viewScheduleFreq && <ViewScheduleModal freq={viewScheduleFreq} onClose={()=>setViewScheduleFreq(null)} onSave={handleScheduleSave} />}

      <div style={{textAlign:'center',padding:'12px 0 20px'}}>
        <button onClick={resetAll} style={{fontSize:11,color:'#94a3b8',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>↺ Reset wireframe</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
