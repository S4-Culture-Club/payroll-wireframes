// ── Date helpers ──────────────────────────────────────────────────────────────
function fmt(d) { return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
function toISO(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fromISO(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }

const UK_BH = new Set([
  '2024-01-01','2024-03-29','2024-04-01','2024-05-06','2024-05-27','2024-08-26','2024-12-25','2024-12-26',
  '2025-01-01','2025-04-18','2025-04-21','2025-05-05','2025-05-26','2025-08-25','2025-12-25','2025-12-26',
  '2026-01-01','2026-04-03','2026-04-06','2026-05-04','2026-05-25','2026-08-31','2026-12-25','2026-12-28',
]);
function isWorkingDay(d) { const w=d.getDay(); return w!==0&&w!==6&&!UK_BH.has(toISO(d)); }
function subtractWD(d,n) {
  let r=new Date(d),c=0;
  while(c<n){r.setDate(r.getDate()-1);if(isWorkingDay(r))c++;}
  while(!isWorkingDay(r))r.setDate(r.getDate()-1);
  return r;
}
function calcDeadlines(payDate,method) {
  const cut=method==='BACS'?3:method==='Bank Transfer'?2:1;
  const co=subtractWD(payDate,cut);
  return { cutOffDate:fmt(co), queryDeadline:fmt(subtractWD(co,1)), bacsApproval:fmt(new Date(co)) };
}
function taxYearEnd(d) {
  const y=d.getFullYear(), a=new Date(y,3,5);
  return d<=a?a:new Date(y+1,3,5);
}
function generateSchedule(freq,firstPayDate,method) {
  if(!firstPayDate) return [];
  const [dd,mm,yy]=firstPayDate.split('/').map(Number);
  if(!dd||!mm||!yy) return [];
  const base=new Date(yy,mm-1,dd), yearEnd=taxYearEnd(base), pm=method||'BACS';
  const freqDays={'Weekly':7,'Fortnightly':14,'Four-Weekly':28};
  const rows=[]; let period=0, payDate=new Date(base);
  while(payDate<=yearEnd){
    period++;
    let pStart,pEnd;
    if(freq==='Monthly'||freq==='Quarterly'){
      pEnd=new Date(payDate); pStart=new Date(payDate.getFullYear(),payDate.getMonth(),1);
    } else {
      pEnd=new Date(payDate); pStart=new Date(payDate);
      pStart.setDate(pStart.getDate()-((freqDays[freq]||7)-1));
    }
    const dl=calcDeadlines(payDate,pm);
    rows.push({period,startDate:fmt(pStart),endDate:fmt(pEnd),payDate:fmt(payDate),...dl});
    const next=new Date(payDate);
    if(freq==='Monthly')next.setMonth(next.getMonth()+1);
    else if(freq==='Quarterly')next.setMonth(next.getMonth()+3);
    else next.setDate(next.getDate()+(freqDays[freq]||7));
    payDate=next;
  }
  return rows;
}

      cursor:disabled?'not-allowed':'pointer',display:'inline-flex',alignItems:'center',

};

// ── Journey Bar ───────────────────────────────────────────────────────────────
function JourneyBar({step}) {
  const steps = [
    {id:1,label:'Pending Setup'},{id:2,label:'PAYE Scheme'},{id:3,label:'Organisation'},
    {id:4,label:'Pay Frequency'},{id:5,label:'Schedule Preview'},{id:6,label:'Dashboard'},
  ];
  return (
    <div style={{background:S4.navy,padding:'10px 28px',position:'sticky',top:0,zIndex:100}}>
      <div style={{maxWidth:1100,margin:'0 auto',display:'flex',alignItems:'center',gap:0}}>
        <span style={{color:'#94c5cf',fontSize:12,fontWeight:700,marginRight:20,whiteSpace:'nowrap'}}>Bureau Setup</span>
        <div style={{display:'flex',alignItems:'center',flex:1,gap:0,flexWrap:'wrap'}}>
          {steps.map((s,i)=>{
            const done=s.id<step, active=s.id===step;
            return (
              <React.Fragment key={s.id}>
                <div style={{display:'flex',alignItems:'center',gap:5,padding:'4px 11px',borderRadius:999,fontSize:11,fontWeight:700,
                  background:done?S4.greenLight:active?S4.teal:'transparent',
                  color:done?S4.green:active?'#fff':'#94a3b8',
                  border:active?'none':done?'none':'1px solid rgba(255,255,255,0.15)'}}>
                  {done&&<span>✓</span>}
                  {!done&&<span style={{width:15,height:15,borderRadius:'50%',background:active?'rgba(255,255,255,0.25)':'rgba(255,255,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:900}}>{s.id}</span>}
                  {s.label}
                </div>
                {i<steps.length-1&&<div style={{width:18,height:1,background:done?S4.green:'rgba(255,255,255,0.2)',flexShrink:0}}/>}
              </React.Fragment>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Modal: Create PAYE Scheme ─────────────────────────────────────────────────
function CreatePAYEModal({org,onClose,onSave}) {
  const [form,setForm] = useState({
    payeRef:'',payeRefName:'',accountsOfficeRef:'',utr:'',
    allSites:null,sites:[],
    employmentAllowance:null,apprenticeshipLevy:null,smallEmployerRelief:null,
    schemeEndDate:'',
  });
  const [errors,setErrors] = useState({});
  const up = (k,v) => setForm(f=>({...f,[k]:v}));
  const toggleSite = s => up('sites',form.sites.includes(s)?form.sites.filter(x=>x!==s):[...form.sites,s]);
  const handleAllSites = val => { up('allSites',val); val==='yes'?up('sites',[...ALL_SITES]):up('sites',[]); };

  const validate = () => {
    const e={};
    const paye=form.payeRef.trim().toUpperCase();
    const aor=form.accountsOfficeRef.trim().toUpperCase();
    const utr=form.utr.replace(/\s/g,'');
    if(!paye) e.payeRef='Enter your employer PAYE reference';
    else if(!/^\d{3}\/[A-Z0-9]{1,10}$/.test(paye)) e.payeRef='Enter a valid employer PAYE reference, like 123/AB456';
    if(!aor) e.accountsOfficeRef='Enter your accounts office reference number';
    else if(!/^\d{3}P[A-Z]\d{8}$/.test(aor)) e.accountsOfficeRef='Enter a valid accounts office reference, like 123PA00045678';
    if(utr&&!/^\d{10}$/.test(utr)) e.utr='Enter a valid 10-digit Unique Taxpayer Reference';
    if(form.allSites===null) e.allSites='Select whether this scheme covers all sites';
    else if(form.allSites==='no'&&form.sites.length===0) e.sites='Select at least one site';
    setErrors(e);
    return Object.keys(e).length===0;
  };

  return ModalShell({
    badge:'SPR-182', badgeColor:S4.teal,
    title:'Create PAYE Scheme',
    subtitle:'Set up the HMRC PAYE scheme for this organisation',
    onClose, maxWidth:680,
    footer:(
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:11,color:S4.subtext}}>Saved and visible on Organisation Settings → PAYE tab</span>
        <div style={{display:'flex',gap:10}}>
          <Btn outline onClick={onClose}>Cancel</Btn>
          <Btn onClick={()=>{if(validate())onSave(form);}}>Save &amp; Continue →</Btn>
        </div>
      </div>
    ),
    children:(
      <div style={{display:'flex',flexDirection:'column',gap:18}}>
        <Banner type="info">Ensure all HMRC reference numbers match your HMRC Online account exactly — these are used for all RTI submissions.</Banner>
        <div>
          <Lbl>Organisation</Lbl>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:S4.cardBg,border:`1px solid ${S4.border}`,borderRadius:8}}>
            <Avatar initials={org.initials} color={org.color} size={24}/>
            <span style={{fontSize:13,fontWeight:600,color:S4.text}}>{org.name}</span>
            <span style={{fontSize:11,color:S4.subtext,marginLeft:4}}>· {org.type}</span>
          </div>
        </div>
        <SecHead>HMRC Reference Numbers</SecHead>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div>
            <Lbl required>Employer PAYE Reference</Lbl>
            <Inp value={form.payeRef} onChange={e=>up('payeRef',e.target.value.toUpperCase())} placeholder="120/A0045678" mono/>
            {errors.payeRef
              ?<div style={{fontSize:11,color:S4.red,marginTop:3}}>{errors.payeRef}</div>
              :<div style={{fontSize:11,color:S4.subtext,marginTop:3}}>3 numbers, a slash, then up to 10 characters — e.g. <strong>123/AB456</strong></div>}
          </div>
          <div>
            <Lbl>PAYE Reference Name</Lbl>
            <Inp value={form.payeRefName} onChange={e=>up('payeRefName',e.target.value)} placeholder="e.g. Main PAYE scheme"/>
            <div style={{fontSize:11,color:S4.subtext,marginTop:3}}>Internal label to identify this scheme</div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div>
            <Lbl required>Accounts Office Reference</Lbl>
            <Inp value={form.accountsOfficeRef} onChange={e=>up('accountsOfficeRef',e.target.value.toUpperCase())} placeholder="120PA00045678" mono/>
            {errors.accountsOfficeRef
              ?<div style={{fontSize:11,color:S4.red,marginTop:3}}>{errors.accountsOfficeRef}</div>
              :<div style={{fontSize:11,color:S4.subtext,marginTop:3}}>13 characters — 3 numbers, P, a letter, 8 numbers. e.g. <strong>123PA00045678</strong></div>}
          </div>
          <div>
            <Lbl>Unique Taxpayer Reference (UTR)</Lbl>
            <Inp value={form.utr} onChange={e=>up('utr',e.target.value)} placeholder="12345 67890" mono/>
            {errors.utr
              ?<div style={{fontSize:11,color:S4.red,marginTop:3}}>{errors.utr}</div>
              :<div style={{fontSize:11,color:S4.subtext,marginTop:3}}>10 digits — found on HMRC correspondence. Spaces allowed.</div>}
          </div>
        </div>
        <SecHead>Site Association</SecHead>
        <div>
          <Lbl required>Does this PAYE scheme cover all sites?</Lbl>
          <div style={{display:'flex',gap:10,marginTop:4}}>
            {[{val:'yes',label:'Yes — all sites',desc:`All ${ALL_SITES.length} sites assigned automatically`},{val:'no',label:'No — select sites',desc:'Choose which sites are covered below'}].map(opt=>(
              <button key={opt.val} onClick={()=>handleAllSites(opt.val)}
                style={{flex:1,padding:'10px 14px',borderRadius:8,border:`2px solid ${form.allSites===opt.val?S4.teal:S4.border}`,background:form.allSites===opt.val?S4.tealLight:'#fff',cursor:'pointer',textAlign:'left'}}>
                <div style={{fontSize:13,fontWeight:700,color:form.allSites===opt.val?S4.teal:S4.text}}>{opt.label}</div>
                <div style={{fontSize:11,color:S4.subtext,marginTop:2}}>{opt.desc}</div>
              </button>
            ))}
          </div>
          {errors.allSites&&<div style={{fontSize:11,color:S4.red,marginTop:4}}>{errors.allSites}</div>}
        </div>
        {form.allSites==='yes'&&(
          <div style={{background:S4.greenLight,border:'1px solid #6ee7b7',borderRadius:8,padding:'10px 14px',fontSize:12,color:'#065f46',display:'flex',gap:8}}>
            <span>✓</span><span>All {ALL_SITES.length} sites covered: {ALL_SITES.join(', ')}</span>
          </div>
        )}

// ── Screen 5: Schedule Preview ────────────────────────────────────────────────
function SchedulePreview({org,freqForm,onBack,onConfirm}) {
  const pm=freqForm.paymentMethod||'BACS';
  const base=generateSchedule(freqForm.frequency,freqForm.firstPayDate||'28/03/2025',pm);
  const fallback=generateSchedule('Monthly','28/03/2025',pm);
  const [schedule,setSchedule]=useState(base.length?base:fallback);
  const [editingIdx,setEditingIdx]=useState(null);
  const [calVal,setCalVal]=useState('');

  const applyEdit=idx=>{
    if(!calVal){setEditingIdx(null);return;}
    const newPD=fromISO(calVal);
    const dl=calcDeadlines(newPD,pm);
    setSchedule(s=>s.map((r,i)=>i===idx?{...r,payDate:fmt(newPD),...dl}:r));
    setEditingIdx(null);
  };

  const periods=schedule.length;
  const taxYrEnd=schedule.length?schedule[schedule.length-1].payDate:'—';

  return (
    <div style={{padding:'24px 28px',maxWidth:1200,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16,gap:12,flexWrap:'wrap'}}>
        <div>
          <h1 style={{fontSize:19,fontWeight:700,color:S4.text,margin:0}}>Pay Schedule Preview</h1>
          <p style={{fontSize:13,color:S4.subtext,marginTop:4}}>
            <strong>{freqForm.name||`${freqForm.frequency} pay run`}</strong> · {periods} periods to tax year end · {pm} payment method
          </p>
        </div>
        <div style={{display:'flex',gap:10}}>
          <Btn outline onClick={onBack}>← Edit frequency</Btn>
          <Btn onClick={onConfirm}>Generate &amp; Save Schedule ✓</Btn>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:14}}>
        {[
          ['Frequency',freqForm.frequency||'–'],
          ['First Pay Date',freqForm.firstPayDate||'28/03/2025'],
          ['Payment Method',pm],
          ['Pay Types',`${freqForm.payTypes?.length||0} selected`],
          ['Periods generated',`${periods} (to ${taxYrEnd})`],
        ].map(([lbl,val])=>(
          <div key={lbl} style={{background:'#fff',border:`1px solid ${S4.border}`,borderRadius:8,padding:'10px 14px'}}>
            <div style={{fontSize:11,color:S4.subtext}}>{lbl}</div>
            <div style={{fontSize:12,fontWeight:700,color:S4.text,marginTop:3}}>{val}</div>
          </div>
        ))}
      </div>

      <Banner type="info">
        Deadlines are calculated in working days, excluding weekends and UK bank holidays. Edit a Pay Date to dynamically recalculate all deadlines for that period. Once saved the schedule is stored against this PAYE and pay frequency.
      </Banner>

      <div style={{display:'flex',gap:16,flexWrap:'wrap',marginTop:12,marginBottom:6}}>
        {[
          {dot:S4.red,label:'Cut-off Date',desc:pm==='BACS'?'3 working days before pay date':pm==='Bank Transfer'?'2 working days before pay date':'1 working day before pay date'},
          {dot:S4.amber,label:'Query Deadline',desc:'1 working day before cut-off'},
          {dot:S4.teal,label:'BACS Approval',desc:'Same as cut-off — payroll must be approved by this date'},
        ].map(item=>(
          <div key={item.label} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:S4.subtext}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:item.dot,flexShrink:0,display:'inline-block'}}></span>
            <strong style={{color:S4.text}}>{item.label}</strong>
            <span>— {item.desc}</span>
          </div>
        ))}
      </div>

      <div style={{marginTop:8,border:`1px solid ${S4.border}`,borderRadius:10,overflow:'hidden',overflowX:'auto'}}>
        <div style={{display:'grid',gridTemplateColumns:'44px 100px 100px 110px 110px 120px 130px 44px',background:S4.navy,padding:'10px 14px',gap:8,minWidth:760}}>
          {['P#','Period Start','Period End','Cut-off Date','Query Deadline','BACS Approval','Pay Date',''].map((h,i)=>(
            <div key={i} style={{color:'#fff',fontSize:10,fontWeight:700,lineHeight:1.3}}>{h}</div>
          ))}
        </div>
        {schedule.map((row,idx)=>(
          <div key={idx} style={{display:'grid',gridTemplateColumns:'44px 100px 100px 110px 110px 120px 130px 44px',padding:'9px 14px',gap:8,alignItems:'center',
            borderBottom:idx<schedule.length-1?`1px solid ${S4.border}`:'none',
            background:editingIdx===idx?S4.tealLight:idx%2===0?'#fff':'#fafcfd',minWidth:760}}>
            <div style={{fontSize:11,fontWeight:700,color:S4.subtext}}>P{row.period}</div>
            <div style={{fontSize:11,color:S4.text}}>{row.startDate}</div>
            <div style={{fontSize:11,color:S4.text}}>{row.endDate}</div>
            <div style={{fontSize:11,color:S4.red,fontWeight:600}}>{row.cutOffDate}</div>
            <div style={{fontSize:11,color:'#d97706',fontWeight:600}}>{row.queryDeadline}</div>
            <div style={{fontSize:11,color:S4.teal,fontWeight:600}}>{row.bacsApproval}</div>
            <div>
              {editingIdx===idx?(
                <div style={{display:'flex',flexDirection:'column',gap:4}}>
                  <input type="date" value={calVal} onChange={e=>setCalVal(e.target.value)}
                    style={{border:`1.5px solid ${S4.teal}`,borderRadius:6,padding:'3px 6px',fontSize:11,outline:'none',width:'100%',background:'#fff'}}/>
                  <div style={{display:'flex',gap:4}}>
                    <button onClick={()=>applyEdit(idx)} style={{flex:1,background:S4.teal,color:'#fff',border:'none',borderRadius:4,padding:'3px 0',cursor:'pointer',fontSize:10,fontWeight:700}}>Apply</button>
                    <button onClick={()=>setEditingIdx(null)} style={{flex:1,background:'none',border:`1px solid ${S4.border}`,borderRadius:4,padding:'3px 0',cursor:'pointer',fontSize:10,color:S4.subtext}}>Cancel</button>
                  </div>
                </div>
              ):(
                <button onClick={()=>{setEditingIdx(idx);const[d,m,y]=row.payDate.split('/');setCalVal(`${y}-${m}-${d}`);}}
                  style={{background:'none',border:`1px solid ${S4.border}`,borderRadius:6,padding:'4px 8px',cursor:'pointer',fontSize:11,color:S4.text,display:'flex',alignItems:'center',gap:4,width:'100%',justifyContent:'space-between'}}>
                  <span style={{fontWeight:600}}>{row.payDate}</span>
                  <span style={{color:'#94a3b8',fontSize:9}}>✏</span>
                </button>
              )}
            </div>
            <div>{idx===0&&<Pill color="teal">Next</Pill>}</div>
          </div>
        ))}
      </div>
      <div style={{marginTop:10,display:'flex',justifyContent:'flex-end'}}>
        <Btn onClick={onConfirm}>Generate &amp; Save Schedule ✓</Btn>
      </div>
    </div>
  );
}

                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:S4.cardBg,borderRadius:8}}>
                <span style={{fontSize:14}}>💳</span>
                <span style={{fontSize:12,color:S4.subtext}}>Payment method:</span>
                <span style={{fontSize:13,fontWeight:700,color:S4.text}}>{freq.method}</span>
              </div>
              <div>
                <div style={{fontSize:11,color:S4.subtext,marginBottom:6}}>Pay types included:</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {freq.types.map(t=><span key={t} style={{background:S4.tealLight,color:S4.teal,borderRadius:999,padding:'2px 10px',fontSize:11,fontWeight:600}}>{t}</span>)}
                </div>
              </div>
              <div style={{display:'flex',gap:8,paddingTop:4,borderTop:`1px solid ${S4.border}`}}>
                <Btn sm ghost full onClick={()=>onViewSchedule&&onViewSchedule(freq)}>View schedule</Btn>
                <Btn sm ghost full>Process payroll →</Btn>
              </div>
            </div>
          </div>
        ))}
        <button onClick={onAddFreq}
          style={{background:'none',border:`2px dashed ${S4.border}`,borderRadius:12,padding:24,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,cursor:'pointer',minHeight:220}}>
          <div style={{width:44,height:44,background:S4.tealLight,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,color:S4.teal}}>＋</div>
          <div style={{fontWeight:700,color:S4.teal,fontSize:13}}>Add pay frequency</div>
          <div style={{fontSize:11,color:S4.subtext,textAlign:'center'}}>Create a new weekly, fortnightly or monthly pay run</div>
        </button>
      </div>

      {editFreq && <EditFreqModal freq={editFreq} onClose={()=>setEditFreq(null)} onSave={()=>setEditFreq(null)} />}
    </div>
  );
}

// ── Screen 3: Org Settings (PAYE tab) ─────────────────────────────────────────
function OrgSettingsScreen({org,payeSchemes,onBack,onAddFreq,onAddPAYE}) {
  const [activeTab,setActiveTab]=useState('PAYE');
  const payeData=payeSchemes[0]||null;

  return (
    <div style={{padding:'24px 28px',maxWidth:1100,margin:'0 auto'}}>
      <button onClick={onBack} style={{fontSize:12,color:S4.teal,background:'none',border:'none',cursor:'pointer',marginBottom:14,display:'flex',alignItems:'center',gap:4}}>
        ← Back to Organisation Dashboard
      </button>
      <div style={{background:'#fff',border:`1px solid ${S4.border}`,borderRadius:12,marginBottom:20}}>
        <div style={{background:S4.navy,borderRadius:'12px 12px 0 0',padding:'16px 22px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <Avatar initials={org.initials} color={org.color} size={48}/>
            <div>
              <div style={{color:'#fff',fontWeight:700,fontSize:17}}>{org.name}</div>
              <div style={{color:'#94c5cf',fontSize:12,marginTop:2}}>{org.type} · {org.sites} sites · {org.employees} employees</div>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {payeData?<Pill color="green">✓ PAYE Configured</Pill>:<Pill color="amber">PAYE Pending</Pill>}
          </div>
        </div>
        <div style={{borderBottom:`1px solid ${S4.border}`,padding:'0 20px',display:'flex'}}>
          {['PAYE','Sites','Documents'].map(tab=>(
            <button key={tab} onClick={()=>setActiveTab(tab)}
              style={{padding:'11px 16px',fontSize:13,fontWeight:600,cursor:'pointer',background:'none',border:'none',
                color:activeTab===tab?S4.teal:S4.subtext,
                borderBottom:activeTab===tab?`2.5px solid ${S4.teal}`:'2.5px solid transparent',marginBottom:-1}}>
              {tab}
            </button>
          ))}
        </div>
        {activeTab==='PAYE'&&(
          <div style={{padding:20,display:'flex',flexDirection:'column',gap:16}}>
            {!payeData?(
              <>
                <Banner type="amber">No PAYE scheme has been configured for this organisation. Create one below to unlock payroll processing and YTD uploads.</Banner>
                <div style={{display:'flex',justifyContent:'center',paddingTop:8}}>
                  <Btn onClick={onAddPAYE}>＋ Create PAYE Scheme</Btn>
                </div>
              </>
            ):(
              <>
                <SecHead>PAYE Scheme Details</SecHead>
                <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12}}>
                  {[
                    ['Employer PAYE Reference',payeData.payeRef||'120/A0045678'],
                    ['PAYE Reference Name',payeData.payeRefName||'Main PAYE scheme'],
                    ['Accounts Office Ref',payeData.accountsOfficeRef||'120PA00045678'],
                    ['UTR',payeData.utr||'—'],
                  ].map(([lbl,val])=>(
                    <div key={lbl} style={{background:S4.cardBg,borderRadius:8,padding:'10px 14px'}}>
                      <div style={{fontSize:11,color:S4.subtext}}>{lbl}</div>
                      <div style={{fontSize:14,fontWeight:700,color:S4.text,marginTop:3,fontFamily:'monospace'}}>{val}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
                  {[
                    ['Employment Allowance',payeData.employmentAllowance],
                    ['Apprenticeship Levy',payeData.apprenticeshipLevy],
                    ['Small Employer Relief',payeData.smallEmployerRelief],
                  ].map(([lbl,val])=>(
                    <div key={lbl} style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',
                      background:val==='Yes'?S4.greenLight:S4.cardBg,
                      border:`1px solid ${val==='Yes'?'#6ee7b7':S4.border}`,borderRadius:8}}>
                      <span style={{fontSize:14}}>{val==='Yes'?'✓':val==='No'?'✕':'○'}</span>
                      <div>
                        <div style={{fontSize:12,color:val==='Yes'?S4.green:S4.subtext,fontWeight:700}}>{lbl}</div>
                        <div style={{fontSize:11,color:val==='Yes'?'#065f46':'#94a3b8'}}>{val||'Not set'}</div>
                      </div>
                    </div>
                  ))}
                </div>
                {(payeData.sites?.length>0||payeData.allSites)&&(
                  <div style={{background:S4.cardBg,borderRadius:8,padding:'10px 14px'}}>
                    <div style={{fontSize:11,color:S4.subtext,marginBottom:4}}>Sites covered</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                      {payeData.allSites==='yes'
                        ?<Pill color="teal">All {ALL_SITES.length} sites</Pill>
                        :payeData.sites?.map(s=><span key={s} style={{background:S4.tealLight,color:S4.teal,borderRadius:999,padding:'2px 10px',fontSize:11,fontWeight:600}}>{s}</span>)}
                    </div>
                  </div>
                )}
                {payeData.schemeEndDate&&(
                  <div style={{background:S4.amberLight,border:`1px solid ${S4.amberBorder}`,borderRadius:8,padding:'10px 14px',fontSize:12,color:'#92400e',display:'flex',gap:8}}>
                    <span>📅</span><span>Scheme end date: <strong>{payeData.schemeEndDate}</strong></span>
                  </div>
                )}
              </>
            )}
          </div>
        )}
        {activeTab!=='PAYE'&&(
          <div style={{padding:40,textAlign:'center',color:'#94a3b8',fontSize:13}}>{activeTab} — not in scope for this wireframe</div>
        )}
      </div>
      <div style={{display:'flex',justifyContent:'flex-end',gap:10}}>
        <Btn outline onClick={onBack}>← Back to Dashboard</Btn>
        <Btn onClick={onAddFreq}>＋ Add Pay Frequency</Btn>
      </div>
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App() {
  const [step,setStep]           = useState(1);
  const [screen,setScreen]       = useState('pending');
  const [activeOrg,setActiveOrg] = useState(null);
  const [payeSchemes,setPayeSchemes] = useState([]);
  const [freqForm,setFreqForm]   = useState(null);
  const [freqs,setFreqs]         = useState([
    {id:'f1',name:'Monthly – Salaried',freq:'Monthly', nextPay:'28 Mar 2025',deadline:'24 Mar 2025',method:'BACS',types:['Basic Salary','Bonus']},
    {id:'f2',name:'Weekly – Hourly',   freq:'Weekly',  nextPay:'07 Apr 2025',deadline:'04 Apr 2025',method:'BACS',types:['Hourly Pay','Shift Allowance']},
  ]);
  const [showPAYE,setShowPAYE]   = useState(false);
  const [showFreq,setShowFreq]   = useState(false);

  const handleSetup = org => { setActiveOrg(org); setStep(2); setShowPAYE(true); };

  const handlePAYESave = data => {
    setPayeSchemes(p=>[...p,{id:`paye-${Date.now()}`,...data}]);
    setShowPAYE(false); setStep(3); setScreen('dashboard');
  };

  const handleFreqSave = data => {
    setFreqForm(data); setShowFreq(false); setStep(5); setScreen('schedule');
  };

  const handleScheduleConfirm = () => {
    const nf={
      id:`f-${Date.now()}`,
      name:freqForm.name||`${freqForm.frequency} – ${activeOrg.name}`,
      freq:freqForm.frequency||'Monthly',
      nextPay:freqForm.firstPayDate||'28 Mar 2025',
      deadline:'24 Mar 2025',
      method:freqForm.paymentMethod||'BACS',
      types:freqForm.payTypes||[],
    };
    setFreqs(p=>[...p,nf]); setStep(6); setScreen('dashboard');
  };

  const goToDashboard   = () => { setScreen('dashboard'); setStep(payeSchemes.length>0?6:3); };
  const goToOrgSettings = () => { setScreen('org_settings'); setStep(3); };
  const goToAddFreq     = () => { setStep(4); setShowFreq(true); };
  const goToAddPAYE     = () => { setStep(2); setShowPAYE(true); };

  const resetAll = () => {
    setStep(1); setScreen('pending'); setActiveOrg(null);
    setPayeSchemes([]); setFreqForm(null); setShowPAYE(false); setShowFreq(false);
    setFreqs([
      {id:'f1',name:'Monthly – Salaried',freq:'Monthly',nextPay:'28 Mar 2025',deadline:'24 Mar 2025',method:'BACS',types:['Basic Salary','Bonus']},
      {id:'f2',name:'Weekly – Hourly',freq:'Weekly',nextPay:'07 Apr 2025',deadline:'04 Apr 2025',method:'BACS',types:['Hourly Pay','Shift Allowance']},
    ]);
  };

  return (
    <div style={{minHeight:'100vh',background:S4.pageBg}}>
      <JourneyBar step={step} />

      {screen==='pending'      && <PendingSetup onSetup={handleSetup} />}
      {screen==='dashboard'    && activeOrg && <OrgDashboard org={activeOrg} payeSchemes={payeSchemes} frequencies={freqs} onAddFreq={goToAddFreq} onOrgSettings={goToOrgSettings} />}
      {screen==='org_settings' && activeOrg && <OrgSettingsScreen org={activeOrg} payeSchemes={payeSchemes} onBack={goToDashboard} onAddFreq={goToAddFreq} onAddPAYE={goToAddPAYE} />}
      {screen==='schedule'     && activeOrg && freqForm && <SchedulePreview org={activeOrg} freqForm={freqForm} onBack={()=>{setStep(4);setShowFreq(true);setScreen('dashboard');}} onConfirm={handleScheduleConfirm} />}

      {showPAYE && activeOrg && <CreatePAYEModal org={activeOrg} onClose={()=>{setShowPAYE(false);setScreen('pending');setStep(1);}} onSave={handlePAYESave} />}
      {showFreq && activeOrg && <CreateFreqModal org={activeOrg} onClose={()=>setShowFreq(false)} onSave={handleFreqSave} />}

      <div style={{textAlign:'center',padding:'12px 0 20px'}}>
        <button onClick={resetAll} style={{fontSize:11,color:'#94a3b8',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>↺ Reset wireframe</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
