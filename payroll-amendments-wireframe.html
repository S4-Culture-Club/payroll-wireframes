<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S4Pay — Payroll Amendments Wireframe</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f4f7f9; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

// ─── S4labour design tokens ───────────────────────────────────────────────────
const S4 = {
  darkTeal:   '#0d3d4f',
  midTeal:    '#1a6b7a',
  lightTeal:  '#e6f4f6',
  cardBg:     '#eef4f7',
  pageBg:     '#f4f7f9',
  text:       '#1a2e35',
  subtext:    '#6b8a94',
  border:     '#d0e2e8',
  amber:      '#f59e0b',
  amberLight: '#fef3c7',
  amberBorder:'#fcd34d',
  green:      '#059669',
  greenLight: '#d1fae5',
  red:        '#dc2626',
  redLight:   '#fee2e2',
};

const EMPLOYEES = [
  { id: '001', name: 'John Smith',     initials: 'JS', color: '#6366f1', area: 'Head office', taxCode: '1257L', w1m1: 'N', sl: 'N', hours: '173.25', gross: '£2,450.00' },
  { id: '002', name: 'Sarah Williams', initials: 'SW', color: '#ec4899', area: 'Head office', taxCode: '1257L', w1m1: 'N', sl: 'N', hours: '281.50', gross: '£3,100.00' },
  { id: '003', name: 'Michael Brown',  initials: 'MB', color: '#0891b2', area: 'FOH',         taxCode: '1257L', w1m1: 'N', sl: 'N', hours: '158.60', gross: '£2,800.00' },
  { id: '004', name: 'Emma Davis',     initials: 'ED', color: '#16a34a', area: 'BOH',         taxCode: '1257L', w1m1: 'N', sl: 'N', hours: '146.00', gross: '£1,950.00' },
  { id: '005', name: 'James Wilson',   initials: 'JW', color: '#d97706', area: 'BOH',         taxCode: '1257L', w1m1: 'N', sl: 'N', hours: '213.30', gross: '£3,500.00' },
];

const PAY_ELEMENTS = [
  'Basic Salary','Bonus','Commission','Car Allowance','London Weighting',
  'Shift Allowance','On-Call Allowance','Statutory Sick Pay',
  'Statutory Maternity Pay','Pension Adjustment','Tax Code Correction','NI Adjustment',
];

const CARDS = [
  { label: 'Net Pay',               before: '£10,544.55', after: '£14,545.55', diff: '+£4,001.00' },
  { label: 'Gross Pay',             before: '£13,800.00', after: '£14,170.00', diff: '+£370.00'   },
  { label: 'Pension contributions', before: '£1,240.00',  after: '£1,273.30',  diff: '+£33.30'    },
  { label: 'HMRC payments',         before: '£1,800.45',  after: '£1,847.20',  diff: '+£46.75'    },
];

// ─── Shared UI primitives ─────────────────────────────────────────────────────
const Avatar = ({ emp, size = 32 }) => (
  <div style={{ width: size, height: size, borderRadius: '50%', background: emp.color, color: '#fff', fontSize: size * 0.36, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
    {emp.initials}
  </div>
);

const TealBtn = ({ children, onClick, disabled, outline, sm, danger }) => {
  const bg    = disabled ? '#cbd5e1' : danger ? S4.red    : outline ? 'transparent' : S4.darkTeal;
  const color = disabled ? '#94a3b8' : danger ? '#fff'    : outline ? (danger ? S4.red : S4.darkTeal) : '#fff';
  const border= disabled ? '#cbd5e1' : danger ? S4.red    : S4.darkTeal;
  return (
    <button onClick={disabled ? undefined : onClick} disabled={disabled}
      style={{ background: bg, color, border: `1.5px solid ${border}`, borderRadius: 8, padding: sm ? '5px 14px' : '8px 18px', fontSize: sm ? 12 : 13, fontWeight: 600, cursor: disabled ? 'not-allowed' : 'pointer', display: 'inline-flex', alignItems: 'center', gap: 6, whiteSpace: 'nowrap' }}>
      {children}
    </button>
  );
};

const FieldLabel = ({ children }) => (
  <div style={{ fontSize: 11, fontWeight: 700, color: S4.subtext, marginBottom: 4, textTransform: 'uppercase', letterSpacing: 0.4 }}>{children}</div>
);

const S4Select = ({ value, onChange, children }) => (
  <select value={value} onChange={onChange} style={{ width: '100%', border: `1px solid ${S4.border}`, borderRadius: 8, padding: '8px 10px', fontSize: 13, background: '#fff', color: S4.text, outline: 'none' }}>
    {children}
  </select>
);

const S4Input = ({ value, onChange, placeholder, prefix }) => (
  <div style={{ display: 'flex', border: `1px solid ${S4.border}`, borderRadius: 8, overflow: 'hidden', background: '#fff' }}>
    {prefix && <span style={{ padding: '8px 10px', background: S4.cardBg, fontSize: 13, color: S4.subtext, borderRight: `1px solid ${S4.border}`, flexShrink: 0 }}>{prefix}</span>}
    <input value={value} onChange={onChange} placeholder={placeholder}
      style={{ flex: 1, padding: '8px 10px', fontSize: 13, border: 'none', outline: 'none', color: S4.text, background: 'transparent', minWidth: 0, width: '100%' }} />
  </div>
);

const ModalShell = ({ title, subtitle, badge, badgeColor, onClose, children, footer, maxWidth = 580 }) => (
  <div style={{ position: 'fixed', inset: 0, background: 'rgba(13,61,79,0.55)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200, padding: 16 }}>
    <div style={{ background: '#fff', borderRadius: 12, boxShadow: '0 24px 64px rgba(0,0,0,0.22)', width: '100%', maxWidth, maxHeight: '90vh', display: 'flex', flexDirection: 'column' }}>
      <div style={{ background: S4.cardBg, borderBottom: `1px solid ${S4.border}`, borderRadius: '12px 12px 0 0', padding: '14px 20px', display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', flexShrink: 0 }}>
        <div>
          {badge && <div style={{ background: badgeColor || S4.lightTeal, color: badgeColor ? '#fff' : S4.midTeal, borderRadius: 6, padding: '2px 8px', fontSize: 10, fontWeight: 700, marginBottom: 5, display: 'inline-block', textTransform: 'uppercase', letterSpacing: 0.5 }}>{badge}</div>}
          <div style={{ fontWeight: 700, color: S4.text, fontSize: 15 }}>{title}</div>
          {subtitle && <div style={{ fontSize: 12, color: S4.subtext, marginTop: 3 }}>{subtitle}</div>}
        </div>
        <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 20, color: '#94a3b8', cursor: 'pointer', lineHeight: 1, marginLeft: 12, flexShrink: 0 }}>✕</button>
      </div>
      <div style={{ overflowY: 'auto', flex: 1, padding: 20 }}>{children}</div>
      {footer && <div style={{ borderTop: `1px solid ${S4.border}`, background: S4.cardBg, borderRadius: '0 0 12px 12px', padding: '12px 20px', flexShrink: 0 }}>{footer}</div>}
    </div>
  </div>
);

const InfoBanner = ({ color, text }) => (
  <div style={{ background: color === 'blue' ? '#eff6ff' : color === 'amber' ? S4.amberLight : S4.greenLight, border: `1px solid ${color === 'blue' ? '#bfdbfe' : color === 'amber' ? S4.amberBorder : '#6ee7b7'}`, borderRadius: 8, padding: '10px 14px', fontSize: 12, color: color === 'blue' ? '#1d4ed8' : color === 'amber' ? '#92400e' : '#065f46', display: 'flex', gap: 8 }}>
    <span style={{ flexShrink: 0 }}>{color === 'blue' ? 'ℹ' : color === 'amber' ? '⚠' : '✓'}</span><span style={{ flex: 1 }}>{text}</span>
  </div>
);

const StagedList = ({ items, onRemove, groupByEmp }) => (
  <div style={{ border: `1px solid ${S4.border}`, borderRadius: 8, overflow: 'hidden' }}>
    <div style={{ padding: '8px 14px', background: S4.cardBg, borderBottom: `1px solid ${S4.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
      <span style={{ fontSize: 13, fontWeight: 600, color: S4.text }}>Amendments to Save</span>
      <span style={{ background: S4.darkTeal, color: '#fff', borderRadius: 999, padding: '1px 8px', fontSize: 11, fontWeight: 700 }}>{items.length}</span>
    </div>
    {groupByEmp ? (
      EMPLOYEES.map(emp => {
        const rows = items.filter(a => a.empId === emp.id);
        if (!rows.length) return null;
        return (
          <div key={emp.id} style={{ borderBottom: `1px solid ${S4.border}` }}>
            <div style={{ padding: '6px 14px', background: '#f8fafc', borderBottom: `1px solid ${S4.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: S4.text }}>{emp.name}</span>
              <span style={{ fontSize: 11, color: S4.subtext }}>{rows.length} amendment{rows.length > 1 ? 's' : ''}</span>
            </div>
            {rows.map(a => (
              <div key={a.id} style={{ padding: '8px 14px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
                <div style={{ fontSize: 12, color: S4.text }}><span style={{ fontWeight: 600 }}>{a.element}</span><span style={{ color: S4.subtext, marginLeft: 6 }}>· £{a.value}</span>{a.desc && <span style={{ color: '#94a3b8', marginLeft: 6, fontStyle: 'italic' }}>{a.desc}</span>}</div>
                <button onClick={() => onRemove(a.id)} style={{ background: 'none', border: 'none', color: '#f87171', cursor: 'pointer', fontSize: 12 }}>Remove</button>
              </div>
            ))}
          </div>
        );
      })
    ) : items.map(a => (
      <div key={a.id} style={{ padding: '10px 14px', borderBottom: `1px solid ${S4.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 600, color: S4.text }}>{a.empName}</div>
          <div style={{ fontSize: 12, color: S4.subtext }}>{a.element} · <span style={{ fontWeight: 600, color: S4.text }}>£{a.value}</span>{a.desc && <span style={{ fontStyle: 'italic', marginLeft: 4 }}>{a.desc}</span>}</div>
        </div>
        <button onClick={() => onRemove(a.id)} style={{ background: 'none', border: 'none', color: '#f87171', cursor: 'pointer', fontSize: 12 }}>Remove</button>
      </div>
    ))}
  </div>
);

// ─── Main component ────────────────────────────────────────────────────────────
const PayrollAmendmentsWireframe = () => {

  const [status, setStatus]         = useState('Under Review');
  const [amendments, setAmendments] = useState([]);
  const [amendHistory, setAmendHistory] = useState([]); // FIX 7: persists after recalculate
  const [rerunDone, setRerunDone]   = useState(false);

  // Modal visibility
  const [showAmendConfirm,  setShowAmendConfirm]  = useState(false); // FIX 1
  const [showApproveConfirm,setShowApproveConfirm]= useState(false); // FIX 10
  const [showTypeModal,     setShowTypeModal]      = useState(false);
  const [showSourcePopup,   setShowSourcePopup]    = useState(false);
  const [showBulkPopup,     setShowBulkPopup]      = useState(false);
  const [showRotaConfirm,   setShowRotaConfirm]    = useState(false);
  const [showRowModal,      setShowRowModal]        = useState(false);
  const [rowEmp,            setRowEmp]             = useState(null);
  const [showProfile,       setShowProfile]        = useState(false);
  const [profileEmp,        setProfileEmp]         = useState(null);
  const [showAmendHistory,  setShowAmendHistory]   = useState(false); // FIX 7

  // Source data form
  const [srcEmp,    setSrcEmp]    = useState('');
  const [srcEl,     setSrcEl]     = useState('');
  const [srcVal,    setSrcVal]    = useState('');
  const [srcDesc,   setSrcDesc]   = useState('');
  const [srcStaged, setSrcStaged] = useState([]);

  // Bulk form
  const [bulkIds,      setBulkIds]      = useState([]);
  const [bulkActiveId, setBulkActiveId] = useState(null);
  const [bulkStaged,   setBulkStaged]   = useState([]);
  const [bulkEl,       setBulkEl]       = useState('');
  const [bulkVal,      setBulkVal]      = useState('');
  const [bulkDesc,     setBulkDesc]     = useState('');

  // Profile deductions
  const [dedRows,    setDedRows]    = useState([
    { id: 'pd1', start: '21/08/2021', end: '21/08/2026', element: 'Healthcare', amount: '£45',  pending: false },
    { id: 'pd2', start: '01/01/2020', end: '01/01/2025', element: 'Rent',       amount: '£100', pending: false },
    { id: 'pd3', start: '30/09/2019', end: '30/12/2025', element: 'Childcare',  amount: '£120', pending: false },
  ]);
  const [showAddForm, setShowAddForm] = useState(false);
  const [dedType,  setDedType]  = useState('Deduction');
  const [dedEl,    setDedEl]    = useState('');
  const [dedAmt,   setDedAmt]   = useState('');
  const [dedStart, setDedStart] = useState('');
  const [dedEnd,   setDedEnd]   = useState('');
  const [dedToast, setDedToast] = useState(false);

  // Reactive: if all amendments removed while recalculate required, revert to Amend Payroll
  useEffect(() => {
    if (status === 'Recalculate Required' && amendments.length === 0) {
      setStatus('Amend Payroll');
    }
  }, [amendments, status]);

  const removeAmendment = (id) => {
    setAmendments(p => p.filter(x => x.id !== id));
  };

  const isAmendMode     = status === 'Amend Payroll';
  const isRerunRequired = status === 'Recalculate Required';
  const isApproved      = status === 'Approved';
  const amendedCount    = [...new Set(amendments.map(a => a.empId))].length;
  const bulkActiveEmp   = EMPLOYEES.find(e => e.id === bulkActiveId);
  const selectedEmps    = EMPLOYEES.filter(e => bulkIds.includes(e.id));

  const resetSrc  = () => { setSrcEmp(''); setSrcEl(''); setSrcVal(''); setSrcDesc(''); setSrcStaged([]); };
  const resetBulk = () => { setBulkIds([]); setBulkActiveId(null); setBulkStaged([]); setBulkEl(''); setBulkVal(''); setBulkDesc(''); };
  const resetAll  = () => { setStatus('Under Review'); setAmendments([]); setAmendHistory([]); setRerunDone(false); resetSrc(); resetBulk(); };

  // ── Dynamic figure helpers ─────────────────────────────────────────────
  const parseAmt = (s) => parseFloat(String(s).replace(/[£,]/g, '')) || 0;
  const fmtAmt   = (n) => '£' + n.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const BASE_GROSS   = 13800.00;
  const BASE_NET     = 10544.55;
  const BASE_PENSION =  1240.00;
  const BASE_HMRC    =  1800.45;
  const NET_RATIO     = BASE_NET     / BASE_GROSS;
  const PENSION_RATIO = BASE_PENSION / BASE_GROSS;
  const HMRC_RATIO    = BASE_HMRC    / BASE_GROSS;

  // Pending amendments total (not yet recalculated)
  const pendingTotal  = amendments.reduce((s, a) => s + parseAmt(a.value), 0);
  // Applied amendments total (post recalculate)
  const appliedTotal  = amendHistory.reduce((s, a) => s + parseAmt(a.value), 0);

  // What figures to show on the cards
  const displayGross   = rerunDone ? BASE_GROSS + appliedTotal : BASE_GROSS;
  const displayNet     = rerunDone ? displayGross * NET_RATIO     : BASE_NET;
  const displayPension = rerunDone ? displayGross * PENSION_RATIO : BASE_PENSION;
  const displayHMRC    = rerunDone ? displayGross * HMRC_RATIO    : BASE_HMRC;

  const dynCards = [
    { label: 'Net Pay',               val: displayNet,     base: BASE_NET,     diff: displayNet     - BASE_NET     },
    { label: 'Gross Pay',             val: displayGross,   base: BASE_GROSS,   diff: displayGross   - BASE_GROSS   },
    { label: 'Pension contributions', val: displayPension, base: BASE_PENSION, diff: displayPension - BASE_PENSION },
    { label: 'HMRC payments',         val: displayHMRC,    base: BASE_HMRC,    diff: displayHMRC    - BASE_HMRC    },
  ];

  // Per-employee amended gross
  const empDisplayGross = (emp) => {
    const base = parseAmt(emp.gross);
    const pending = amendments.filter(a => a.empId === emp.id).reduce((s,a) => s + parseAmt(a.value), 0);
    const applied = amendHistory.filter(a => a.empId === emp.id).reduce((s,a) => s + parseAmt(a.value), 0);
    if (rerunDone) return fmtAmt(base + applied);
    if (pending > 0) return fmtAmt(base + pending);
    return emp.gross;
  };

  const addSrcStaged = () => {
    if (!srcEmp || !srcEl || !srcVal) return;
    const e = EMPLOYEES.find(x => x.id === srcEmp);
    setSrcStaged(p => [...p, { id: Date.now(), empId: srcEmp, empName: e.name, element: srcEl, value: srcVal, desc: srcDesc }]);
    setSrcEl(''); setSrcVal(''); setSrcDesc('');
  };
  const saveSrc = () => {
    setAmendments(p => [...p, ...srcStaged]);
    setStatus('Recalculate Required'); setRerunDone(false);
    setShowSourcePopup(false); resetSrc();
  };

  // FIX 12: Checkbox toggles selection; row click only focuses
  const toggleBulkCheck = (e, id) => {
    e.stopPropagation();
    setBulkIds(p => {
      if (p.includes(id)) {
        const next = p.filter(x => x !== id);
        if (bulkActiveId === id) setBulkActiveId(next[0] || null);
        return next;
      }
      return [...p, id];
    });
  };
  const focusBulkRow = (id) => {
    setBulkActiveId(id);
    setBulkEl(''); setBulkVal(''); setBulkDesc('');
  };

  const addBulkStaged = () => {
    if (!bulkEl || !bulkVal) return;
    const targets = bulkIds.length > 0 ? bulkIds : (bulkActiveId ? [bulkActiveId] : []);
    if (targets.length === 0) return;
    const newEntries = targets.map(id => {
      const emp = EMPLOYEES.find(e => e.id === id);
      return { id: Date.now() + Math.random(), empId: id, empName: emp.name, element: bulkEl, value: bulkVal, desc: bulkDesc };
    });
    setBulkStaged(p => [...p, ...newEntries]);
    setBulkEl(''); setBulkVal(''); setBulkDesc('');
  };
  const saveBulk = () => {
    setAmendments(p => [...p, ...bulkStaged]);
    setStatus('Recalculate Required'); setRerunDone(false);
    setShowBulkPopup(false); resetBulk();
  };

  // FIX 7: save history before clearing amendments
  const triggerRerun = () => {
    setAmendHistory(prev => [...prev, ...amendments]);
    setStatus('Under Review'); setRerunDone(true); setAmendments([]);
  };

  const saveDed = () => {
    if (!dedEl || !dedAmt || !dedStart) return;
    const row = { id: `pd-${Date.now()}`, start: dedStart, end: dedEnd || 'Ongoing', element: dedEl, amount: dedAmt.startsWith('£') ? dedAmt : `£${dedAmt}`, pending: true, type: dedType };
    setDedRows(p => [...p, row]);
    setAmendments(p => [...p, { id: row.id, empId: profileEmp?.id, empName: profileEmp?.name, element: `${dedType}: ${dedEl}`, value: dedAmt.replace('£',''), desc: dedStart + (dedEnd ? ` – ${dedEnd}` : '') }]);
    setStatus('Recalculate Required'); setRerunDone(false);
    setDedEl(''); setDedAmt(''); setDedStart(''); setDedEnd(''); setDedType('Deduction');
    setShowAddForm(false); setDedToast(true); setTimeout(() => setDedToast(false), 3000);
  };

  // ══════════════════════════════════════════════════════════════════════════
  // FIX 9: Journey tracker — sticky top bar
  // ══════════════════════════════════════════════════════════════════════════
  const JourneyBar = () => {
    const steps = [
      { label: 'Under Review',    done: ['Amend Payroll','Recalculate Required','Approved'].includes(status) || rerunDone, active: status === 'Under Review' && !rerunDone },
      { label: 'Amend Payroll',   done: ['Recalculate Required','Approved'].includes(status) || rerunDone, active: isAmendMode },
      { label: 'Save amendments', done: isRerunRequired || rerunDone || isApproved, active: isAmendMode && amendments.length > 0 },
      { label: 'Re-calculate',    done: rerunDone || isApproved, active: isRerunRequired },
      { label: 'Approve',         done: isApproved, active: rerunDone && !isApproved },
    ];
    const guidance = status === 'Under Review' && !rerunDone ? 'Click "Amend payroll" to unlock amendments'
      : isAmendMode && amendments.length === 0 ? 'Click ✏ on any employee row to add amendments'
      : isAmendMode ? 'Amendments added — save them, then re-calculate'
      : isRerunRequired ? `${amendments.length} amendment${amendments.length !== 1 ? 's' : ''} saved — re-calculate when ready`
      : rerunDone && !isApproved ? 'Re-calculate complete — review updated figures then approve'
      : isApproved ? '✓ Payroll approved and locked' : '';
    return (
      <div style={{ background: '#fff', borderBottom: `1px solid ${S4.border}`, padding: '10px 28px', position: 'sticky', top: 0, zIndex: 10 }}>
        <div style={{ maxWidth: 1100, margin: '0 auto', display: 'flex', alignItems: 'center', gap: 0, justifyContent: 'space-between', flexWrap: 'wrap' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            {steps.map((s, i, arr) => (
              <React.Fragment key={s.label}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '4px 12px', borderRadius: 999, fontSize: 12, fontWeight: 600,
                  background: s.done ? S4.greenLight : s.active ? S4.darkTeal : '#f1f5f9',
                  color:      s.done ? S4.green     : s.active ? '#fff'       : '#94a3b8' }}>
                  {s.done && <span>✓</span>}{s.label}
                </div>
                {i < arr.length - 1 && <span style={{ color: '#cbd5e1', fontSize: 13, margin: '0 2px' }}>→</span>}
              </React.Fragment>
            ))}
          </div>
          <div style={{ fontSize: 12, color: S4.subtext, fontStyle: 'italic', marginTop: 2 }}>{guidance}</div>
        </div>
      </div>
    );
  };

  // ══════════════════════════════════════════════════════════════════════════
  // FIX 1: Amend confirmation modal
  // ══════════════════════════════════════════════════════════════════════════
  const AmendConfirmModal = () => (
    <ModalShell title="Start amendment process?" subtitle="Please read before continuing" onClose={() => setShowAmendConfirm(false)}
      footer={
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10 }}>
          <TealBtn outline onClick={() => setShowAmendConfirm(false)}>Cancel — keep as Under Review</TealBtn>
          <TealBtn onClick={() => { setStatus('Amend Payroll'); setShowAmendConfirm(false); }}>Yes, enter Amend mode</TealBtn>
        </div>
      }>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <InfoBanner color="amber" text="Entering amend mode will require a re-calculate before this payroll can be approved. This cannot be skipped." />
        <div style={{ background: S4.cardBg, border: `1px solid ${S4.border}`, borderRadius: 10, padding: 16 }}>
          <div style={{ fontWeight: 700, color: S4.text, fontSize: 13, marginBottom: 10 }}>What happens next:</div>
          {[
            'Amendments are unlocked — you can add, edit or remove pay element changes',
            'Once saved, a Re-calculate is required before Approve becomes available',
            'You can add more amendments after saving, up until you Re-calculate',
            'Re-calculating will update all summary figures for your review',
          ].map((s, i) => (

                    <div><FieldLabel>Start Date *</FieldLabel><S4Input value={dedStart} onChange={e => setDedStart(e.target.value)} placeholder="DD/MM/YYYY" /></div>
                    <div><FieldLabel>End Date (optional)</FieldLabel><S4Input value={dedEnd} onChange={e => setDedEnd(e.target.value)} placeholder="DD/MM/YYYY or leave blank" /></div>
                    <div><FieldLabel>Amount *</FieldLabel><S4Input prefix="£" value={dedAmt} onChange={e => setDedAmt(e.target.value)} placeholder="0.00" /></div>
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10, marginTop: 12 }}>
                    <TealBtn outline sm onClick={() => setShowAddForm(false)}>Cancel</TealBtn>
                    <TealBtn sm disabled={!dedEl || !dedAmt || !dedStart} onClick={saveDed}>Save</TealBtn>
                  </div>
                </div>
              )}
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                <thead>
                  <tr style={{ background: S4.darkTeal }}>
                    {['Start date','End date','Pay Element details','Deduction','Actions'].map((h, i) => (
                      <th key={i} style={{ padding: '10px 16px', color: '#fff', fontWeight: 600, textAlign: i === 3 ? 'right' : 'left', fontSize: 12 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {dedRows.map((row, i) => (
                    <tr key={row.id} style={{ borderBottom: `1px solid ${S4.border}`, background: row.pending ? '#fffbeb' : i % 2 === 0 ? '#fff' : '#fafcfd' }}>
                      <td style={{ padding: '10px 16px', color: S4.text }}>{row.start}</td>
                      <td style={{ padding: '10px 16px', color: S4.text }}>{row.end}</td>
                      <td style={{ padding: '10px 16px' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                          {row.type && row.type !== 'Deduction' && <span style={{ background: '#ede9fe', color: '#7c3aed', borderRadius: 4, padding: '1px 6px', fontSize: 10, fontWeight: 700 }}>{row.type}</span>}
                          <span style={{ color: S4.text }}>{row.element}</span>
                          {row.pending && <span style={{ background: S4.amberLight, color: '#92400e', borderRadius: 999, padding: '1px 8px', fontSize: 10, fontWeight: 700 }}>Pending re-calculate</span>}
                        </div>
                      </td>
                      <td style={{ padding: '10px 16px', textAlign: 'right', fontWeight: 600, color: S4.text }}>{row.amount}</td>
                      <td style={{ padding: '10px 16px' }}>
                        <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
                          <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: S4.subtext, fontSize: 15 }}>✏</button>
                          <button onClick={() => setDedRows(p => p.filter(d => d.id !== row.id))} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#f87171', fontSize: 15 }}>🗑</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                  {dedRows.length === 0 && <tr><td colSpan={5} style={{ padding: 24, textAlign: 'center', color: '#94a3b8', fontSize: 13 }}>No additions or deductions recorded</td></tr>}
                </tbody>
              </table>
              <div style={{ padding: '8px 16px', background: S4.cardBg, borderTop: `1px solid ${S4.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 12, color: S4.subtext }}>Showing 1–{dedRows.length} of {dedRows.length}</span>
                <div style={{ display: 'flex', gap: 3, alignItems: 'center' }}>
                  {['«','‹','1','2','3','›','»'].map((p, i) => (
                    <button key={i} style={{ width: 24, height: 24, borderRadius: 4, border: `1px solid ${S4.border}`, background: p === '1' ? S4.midTeal : '#fff', color: p === '1' ? '#fff' : S4.subtext, fontSize: 11, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{p}</button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <div style={{ borderTop: `1px solid ${S4.border}`, background: S4.cardBg, borderRadius: '0 0 12px 12px', padding: '10px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
            <span style={{ fontSize: 12, color: dedRows.some(d => d.pending) ? '#92400e' : S4.subtext }}>
              {dedRows.some(d => d.pending) ? '⚠ Pending entries will apply after payroll is re-calculated.' : ''}
            </span>
            <TealBtn outline sm onClick={() => { setShowProfile(false); setShowAddForm(false); }}>Close</TealBtn>
          </div>
        </div>
      </div>
    );
  };

  // ══════════════════════════════════════════════════════════════════════════
  // RENDER
  // ══════════════════════════════════════════════════════════════════════════
  return (
    <div>
      {PayrollScreen()}
      {showAmendConfirm   && AmendConfirmModal()}
      {showApproveConfirm && ApproveConfirmModal()}
      {showAmendHistory   && AmendHistoryModal()}
      {showTypeModal      && TypeModal()}
      {showSourcePopup    && SourcePopup()}
      {showBulkPopup      && BulkPopup()}
      {showRotaConfirm    && RotaConfirm()}
      {showRowModal       && RowModal()}
      {showProfile        && ProfileModal()}
    </div>
  );
};




    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PayrollAmendmentsWireframe />);
  </script>
</body>
</html>
